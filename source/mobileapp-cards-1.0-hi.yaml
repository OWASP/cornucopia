    value: "10"
    url: "https://cornucopia.owasp.org/cards/CMX"
    desc: "कार्लोस फिशिंग कैंपेन शुरू करने के लिए एप्लिकेशन की नोटिफिकेशन सेवाओं का उपयोग कर सकता है क्योंकि सर्वोत्तम प्रथाओं के अनुसार नोटिफिकेशन को सैनिटाइज और वैलिडेट नहीं किया गया है"
  -
    id: "CMJ"
    value: "J"
    url: "https://cornucopia.owasp.org/cards/CMJ"
    desc: "लुइस अन्य उपयोगकर्ताओं के डेटा को भ्रष्ट करने के लिए क्रिप्टोग्राफिक तरीकों को प्रभावित या बदल सकता है क्योंकि बाहरी सेवाओं के साथ साझा करने से पहले एन्क्रिप्टेड डेटा की अखंडता सत्यापित नहीं की जाती है"
  -
    id: "CMQ"
    value: "Q"
    url: "https://cornucopia.owasp.org/cards/CMQ"
    desc: "विक्टर ऐप को पैच कर सकता है और दुर्भावनापूर्ण कोड वितरित करने के लिए इसका उपयोग कर सकता है क्योंकि रनटाइम इंटीग्रिटी चेक उतने मजबूत नहीं हैं जितनी सिफारिश की गई है"
  -
    id: "CMK"
    value: "K"
    url: "https://cornucopia.owasp.org/cards/CMK"
    desc: "रूबेन बिना किसी संशोधन के दुर्भावनापूर्ण कोड फैलाने के लिए ऐप का उपयोग कर सकता है क्योंकि स्थानांतरण और भंडारण के तरीके उचित डेटा सैनिटाइजेशन और वैलिडेशन नहीं करते हैं"
  -
    id: "CMA"
    value: "A"
    url: "https://cornucopia.owasp.org/cards/CMA"
    desc: "आपने किसी भी प्रकार का एक नया हमला ईजाद किया है"
    misc: "इस विषय के बारे में अधिक पढ़ें OWASP की मोबाइल एप्लिकेशन सुरक्षा पर मुफ्त चीट शीट्स में, और OWASP MAS वेबसाइट पर “मोबाइल एप्लिकेशन सुरक्षा परीक्षण गाइड” में “मोबाइल ऐप उपयोगकर्ता गोपनीयता सुरक्षा” के बारे में"
-
  id: "WC"
  name: "वाइल्ड कार्ड"
  cards:
  -
    id: "JOAM"
    value: "A"
    url: "https://cornucopia.owasp.org/cards/JOAM"
    card: "जोकर"
    desc: "स्टार ऐप को प्रभावित, परिवर्तित या बाधित कर सकता है ताकि यह अब कानूनी, नियामक, संविदात्मक या अन्य जनादेशों का पालन न करे"
    misc: "क्या आपने व्यक्तिगत OWASP सदस्य बनने के बारे में सोचा है? सभी उपकरण, मार्गदर्शन और स्थानीय बैठकें सभी के लिए निःशुल्क हैं, लेकिन व्यक्तिगत सदस्यता OWASP के काम को समर्थन देने में मदद करती है"
  -
    id: "JOBM"
    value: "B"
    url: "https://cornucopia.owasp.org/cards/JOBM"
    card: "जोकर"
    desc: "मैलोरी बॉब की सहमति और/या अधिसूचना के बिना, बॉब की निगरानी करने, जासूसी करने, गुप्त रूप से सुनने, रिमोट कंट्रोल करने, ट्रैक करने या अन्यथा मॉनिटर करने के लिए बॉब के डिवाइस पर इंस्टॉल किए गए ऐप का दुर्भावनापूर्ण उपयोग कर सकता है"
    misc: "कमजोरियों की जांच करें और जानें कि OWASP MAS वेबसाइट पर मुफ्त MASTG संदर्भ अनुप्रयोगों का उपयोग करके उन्हें कैसे ठीक किया जा सकता है"

paragraphs:
-
  id: "Common"
  name: "सामान्य"
  sentences:
  -
    id: "NoCard"
    text: "कोई कार्ड नहीं"
  -
    id: "Title"
    text: "मोबाइल ऐप संस्करण v1.00-HI"
  -
    id: "Title_full"
    text: "OWASP® कॉर्नुकोपिया मोबाइल ऐप संस्करण v1.00-HI"
  -
    id: "T00010"
    text: "OWASP® कॉर्नुकोपिया सॉफ्टवेयर विकास टीमों को चुस्त (Agile), पारंपरिक और औपचारिक विकास प्रक्रियाओं में सुरक्षा आवश्यकताओं की पहचान करने में सहायता करने का एक तंत्र है।"
  -
    id: "T00020"
    text: "लेखक"
  -
    id: "T00100"
    text: "आभार"
  -
    id: "T00110"
    text: "एडम शोस्टैक और माइक्रोसॉफ्ट SDL टीम को “एलिवेशन ऑफ प्रिविलेज थ्रेट मॉडलिंग गेम” के लिए, जो कॉर्नुकोपिया के लिए प्रेरणा के रूप में क्रिएटिव कॉमन्स एट्रिब्यूशन लाइसेंस के तहत प्रकाशित हुआ था।"
  -
    id: "T00120"
    text: "कॉलिन वॉटसन को कॉर्नुकोपिया के विचार के लिए जिस पर OWASP कॉर्नुकोपिया मोबाइल ऐप संस्करण आधारित है।"
  -
    id: "T00130"
    text: "OWASP MASVS/MASTG, Mitre के कॉमन अटैक पैटर्न एन्यूमरेशन एंड क्लासिफिकेशन (CAPEC™), और SAFECode के योगदानकर्ताओं, समर्थकों और स्वयंसेवकों को।"
  -
    id: "T00145"
    text: "OWASP® कॉर्नुकोपिया प्रोजेक्ट के वर्तमान और पिछले योगदानकर्ताओं और नेताओं को।"
  -
    id: "T00150"
    text: "प्रिंट-रेडी डिज़ाइन फ़ाइलें बनाने और दान करने के लिए Blackfoot (UK) Limited को।"
  -
    id: "T00161"
    text: "(पृष्ठ 20 पर जारी)"
  -
    id: "T00162"
    text: "(पृष्ठ 10 से जारी)"
  -
    id: "T00200"
    text: "परिचय"
  -
    id: "T00210"
    text: "कॉर्नुकोपिया के पीछे का विचार विकास टीमों, विशेष रूप से Agile कार्यप्रणाली का उपयोग करने वाली टीमों को एप्लिकेशन सुरक्षा आवश्यकताओं की पहचान करने और सुरक्षा-आधारित उपयोगकर्ता कहानियां विकसित करने में मदद करना है।"
  -
    id: "T00220"
    text: "कॉर्नुकोपिया मोबाइल ऐप संस्करण उन्हीं अवधारणाओं और खेल रणनीति का उपयोग करता है जो वेबसाइट ऐप संस्करण में हैं, लेकिन इसे मोबाइल विकास करने वाली टीमों के लिए बनाया गया है।"
  -
    id: "T00240"
    text: "कॉर्नुकोपिया थ्रेट-मॉडलिंग विचारों को उन मोबाइल विकास टीमों में पेश करने का प्रयास करता है जो Agile कार्यप्रणाली का उपयोग करती हैं।"
  -
    id: "T00300"
    text: "कार्ड डेक (पैक)"
  -
    id: "T00310"
    text: "कार्ड परिदृश्यों का उद्देश्य सभी MASVS 2.0 आवश्यकताओं और MASTG के परीक्षणों को कवर करना है। यह ध्यान रखना महत्वपूर्ण है कि सुरक्षा दिशानिर्देश हमेशा बदलते रहते हैं।"
  -
    id: "T00311"
    text: "कॉर्नुकोपिया मोबाइल ऐप संस्करण के सूट मोबाइल एप्लिकेशन सुरक्षा सत्यापन मानक (MASVS) के अनुभागों पर आधारित हैं।"
  -
    id: "T00320"
    text: "इसमें पाँच सूट दिए गए हैं, और छठा जिसे “कॉर्नुकोपिया” कहा जाता है, उसे ट्रम्प सूट के रूप में बनाया गया था: "
  -
    id: "T00330"
    text: "प्लेटफ़ॉर्म और कोड (PC)"
  -
    id: "T00340"
    text: "प्रमाणीकरण और प्राधिकरण (AA)"
  -
    id: "T00350"
    text: "नेटवर्क और स्टोरेज (NS)"
  -
    id: "T00360"
    text: "लचीलापन (RS)"
  -
    id: "T00370"
    text: "क्रिप्टोग्राफी (CRM)"
  -
    id: "T00380"
    text: "कॉर्नुकोपिया (CM)"
  -
    id: "T00390"
    text: "पोकर कार्ड के समान, प्रत्येक सूट में 13 कार्ड होते हैं (इक्का, 2-10, गुलाम, बेगम और बादशाह)।"
  -
    id: "T00400"
    text: "वेबसाइट ऐप संस्करण के समान दो जोकर कार्ड भी हैं।"
  -
    id: "T00500"
    text: "मैपिंग"
  -
    id: "T00510"
    text: "मोबाइल कॉर्नुकोपिया का दूसरा उद्देश्य हमलों को आवश्यकताओं और सत्यापन तकनीकों के साथ जोड़ना है।"
  -
    id: "T00520"
    text: "MASVS 2.0 और MASTG कोड के अलावा, कार्ड CAPEC™ सॉफ़्टवेयर अटैक पैटर्न आईडी से भी जुड़े हैं जो CWE से मैप किए गए हैं।"
  -
    id: "T00530"
    text: "प्रत्येक कार्ड को SAFECode दस्तावेज़ की 36 प्राथमिक सुरक्षा कहानियों से भी मैप किया गया है।"
  -
    id: "T00600"
    text: "खेल की रणनीति"
  -
    id: "T00610"
    text: "सामग्री के अंतर के अलावा, खेल के नियम वेबसाइट ऐप संस्करण के समान ही हैं।"
  -
    id: "T01000"
    text: "प्रतिक्रिया दें"
  -
    id: "T01010"
    text: "यदि आपके पास OWASP® मोबाइल कॉर्नुकोपिया के उपयोग पर विचार या प्रतिक्रिया है, तो कृपया साझा करें।"
  -
    id: "T01020"
    text: "यदि आप कार्ड के वैकल्पिक संस्करण या पेशेवर प्रिंट-रेडी संस्करण बनाते हैं, तो कृपया उसे स्वयंसेवकों और समुदाय के साथ साझा करें।"
  -
    id: "T01030"
    text: "चर्चा करने या योगदान देने के लिए सबसे अच्छी जगह OWASP प्रोजेक्ट की सूची/समूह है:"
  -
    id: "T01040"
    text: "सूची/समूह"
  -
    id: "T01050"
    text: "प्रोजेक्ट होम पेज"
  -
    id: "T01060"
    text: "सभी OWASP दस्तावेज़ और उपकरण डाउनलोड करने और उपयोग करने के लिए निःशुल्क हैं।"
  -
    id: "T01070"
    text: "OWASP® मोबाइल कॉर्नुकोपिया क्रिएटिव कॉमन्स एट्रिब्यूशन-शेयरअलाइक 3.0 लाइसेंस के तहत लाइसेंस प्राप्त है।"
  -
    id: "T01100"
    text: "निर्देश"
  -
    id: "T01110"
    text: "प्रत्येक कार्ड पर दिया गया टेक्स्ट एक हमले का वर्णन करता है, और हमलावर को एक नाम दिया गया है।"
  -
    id: "T01120"
    text: "नाम एक कंप्यूटर सिस्टम, एक व्यक्ति या लोगों के समूह का प्रतिनिधित्व कर सकता है।"
  -
    id: "T01130"
    text: "हमलावर रिमोट हो सकता है या उसी डिवाइस/नेटवर्क तक पहुंच रखने वाला स्थानीय/आंतरिक व्यक्ति हो सकता है।"
  -
    id: "T01140"
    text: "हमलावर का नाम हमेशा प्रत्येक विवरण की शुरुआत में दिया जाता है।"
  -
    id: "T01150"
    text: "एक उदाहरण है:"
  -
    id: "T01160"
    text: "वोंग ऑथेंटिकेशन को बायपास कर सकता है क्योंकि यह सुरक्षित रूप से विफल नहीं होता है।"
  -
    id: "T01170"
    text: "इसका मतलब है कि हमलावर, वोंग, बिना क्रेडेंशियल दिए ऐप में लॉग इन कर सकता है क्योंकि लॉगिन तंत्र विफल होने पर पहुंच की अनुमति देता है।"
  -
    id: "T01180"
    text: "हमले मुख्य रूप से MASVS 2.0 मोबाइल एप्लिकेशन टेस्टिंग गाइड और एंड्रॉइड/आईओएस सुरक्षित कोडिंग गाइड से लिए गए थे।"
  -
    id: "T01200"
    text: "ज्यादातर कार्डों पर हमलों और गाइडों के बीच लुकअप दिए गए हैं:"
  -
    id: "T01210"
    text: "MASVS मोबाइल एप्लिकेशन टेस्ट गाइड से टेस्ट कोड:"
  -
    id: "T01220"
    text: "मोबाइल एप्लिकेशन सुरक्षा सत्यापन मानक (MASVS) 2.0 में सत्यापन आईडी"
  -
    id: "T01240"
    text: "कॉमन अटैक पैटर्न एन्यूमरेशन एंड क्लासिफिकेशन (CAPEC™) में आईडी"
  -
    id: "T01250"
    text: "SAFECode, जुलाई 2012 के दस्तावेज़ में सुरक्षा-केंद्रित कहानियाँ"
  -
    id: "T01260"
    text: "लुकअप का मतलब है कि हमला संदर्भित आइटम के भीतर शामिल है, लेकिन जरूरी नहीं कि यह उसके पूरे इरादे को कवर करता हो।"
  -
    id: "T01270"
    text: "CAPEC™ जैसे संरचित डेटा के लिए, सबसे विशिष्ट संदर्भ प्रदान किया गया है।"
  -
    id: "T01280"
    text: "छह इक्कों और दो जोकरों पर कोई लुकअप नहीं है।"
  -
    id: "T01290"
    text: "इसके बजाय इन कार्डों में इटैलिक टेक्स्ट में कुछ सामान्य सुझाव दिए गए हैं।"
  -
    id: "T01300"
    text: "कॉर्नुकोपिया को कई अलग-अलग तरीकों से खेलना संभव है।"
  -
    id: "T01301"
    text: "कैसे खेलें, इसके लिए पृष्ठ 11-19 पर जारी रखें।"
  -
    id: "T01400"
    text: "तैयारियाँ"
  -
    id: "T01410"
    text: "कॉर्नुकोपिया कार्डों का एक डेक प्राप्त करें, या अपना स्वयं का डेक प्रिंट करें और कार्डों को अलग करें/काटें।"
  -
    id: "T01411"
    text: "इस पैक के कार्डों का उपयोग करें।"
  -
    id: "T01420"
    text: "समीक्षा के लिए एक एप्लिकेशन या एप्लिकेशन प्रक्रिया की पहचान करें।"
  -
    id: "T01430"
    text: "समीक्षा में मदद के लिए डेटा फ्लो डायग्राम या यूजर स्टोरीज़ बनाएं।"
  -
    id: "T01440"
    text: "3-6 आर्किटेक्ट्स, डेवलपर्स और टेस्टर्स के समूह को आमंत्रित करें और एक मेज के चारों ओर बैठें।"
  -
    id: "T01450"
    text: "कुछ पुरस्कार हाथ में रखें (आपकी कार्यालय संस्कृति के आधार पर चॉकलेट, पिज्जा आदि)।"
  -
    id: "T01500"
    text: "खेलें"
  -
    id: "T01510"
    text: "एक सूट - कॉर्नुकोपिया - ट्रम्प के रूप में कार्य करता है।"
  -
    id: "T01520"
    text: "इक्के ऊंचे होते हैं (यानी वे बादशाह को हरा देते हैं)।"
  -
    id: "T01530"
    text: "यदि मुद्दों और स्कोर को लिखने के लिए कोई नॉन-प्लेयर (रेफरी) हो तो मदद मिलती है।"
  -
    id: "T01540"
    text: "कॉर्नुकोपिया सूट से जोकर और कुछ कम स्कोर वाले (2, 3, 4) कार्ड हटा दें।"
