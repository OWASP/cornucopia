suits:
-
  id: "PC"
  name: "Платформа та код"
  cards:
  -
    id: "PC2"
    value: "2"
    url: "https://cornucopia.owasp.org/cards/PC2"
    desc: "Ендрю може розкрити конфіденційні дані через автоматично створені знімки екрана застосунку, коли застосунок переходить у фоновий режим"
  -
    id: "PC3"
    value: "3"
    url: "https://cornucopia.owasp.org/cards/PC3"
    desc: "Гарольд може підглядати конфіденційні дані, що вводяться через інтерфейс користувача, оскільки дані є надлишковими, не замасковані належним чином або не очищені після використання"
  -
    id: "PC4"
    value: "4"
    url: "https://cornucopia.owasp.org/cards/PC4"
    desc: "Келлі може розкрити конфіденційні дані, скориставшись надмірними дозволами застосунку, пов'язаними з використанням геолокації, камери, мікрофона, сховища тощо"
  -
    id: "PC5"
    value: "5"
    url: "https://cornucopia.owasp.org/cards/PC5"
    desc: "Джейсон може спровокувати витік або пошкодження пам'яті, оскільки застосунок має циклічні залежності, неналежно керує покажчиками, підтримує неправильний лічильник посилань, не звільняє спільні ресурси або не застосовує захист стека"
  -
    id: "PC6"
    value: "6"
    url: "https://cornucopia.owasp.org/cards/PC6"
    desc: "Доун може розкрити та перехопити конфіденційні функції через міжпроцесну комунікацію, оскільки дозволи на трансляцію та спільний доступ не встановлені, недостатньо обмежені, або тому що конфіденційні функції не виключені належним чином під час спільного використання"
  -
    id: "PC7"
    value: "7"
    url: "https://cornucopia.owasp.org/cards/PC7"
    desc: "Лорен може переміщатися або модифікувати захищені файли через доступ до базової файлової системи, використовуючи слабкі місця у постачальниках контенту на базі файлової системи, резолверах або їхній конфігурації"
  -
    id: "PC8"
    value: "8"
    url: "https://cornucopia.owasp.org/cards/PC8"
    desc: "Колін може розкрити конфіденційні дані через міжпроцесну комунікацію застосунку, оскільки методи запитів постачальника контенту не параметризовані належним чином, а аргументи не валідуються або не очищаються належним чином"
  -
    id: "PC9"
    value: "9"
    url: "https://cornucopia.owasp.org/cards/PC9"
    desc: "Тобі може змінити або розкрити дані шляхом ін'єкції, оскільки відповідь на неявні інтенти не перевіряється належним чином"
  -
    id: "PCX"
    value: "10"
    url: "https://cornucopia.owasp.org/cards/PCX"
    desc: "Макс може змінити або розкрити дані, оскільки перевірка та очищення вхідних даних не застосовуються належним чином до міжпроцесної комунікації, або розширення не обмежені належним чином"
  -
    id: "PCJ"
    value: "В"
    url: "https://cornucopia.owasp.org/cards/PCJ"
    desc: "Юхан може змінити або розкрити конфіденційні дані, використовуючи слабкі місця в SDK або сторонніх бібліотеках, оскільки оновлення застосунку та платформи не є обов'язковими або не виправляють відомі вразливості програмного забезпечення"
  -
    id: "PCQ"
    value: "Д"
    url: "https://cornucopia.owasp.org/cards/PCQ"
    desc: "Ксав'є може впровадити скрипти у веб-перегляд, оскільки він дозволяє вбудовування контенту через глибокі посилання без належної авторизації та перевірки хоста, схеми та шляху цільового ресурсу, оскільки вони можуть бути змінені користувачем, або тому що безпечний перегляд вимкнено"
  -
    id: "PCK"
    value: "К"
    url: "https://cornucopia.owasp.org/cards/PCK"
    desc: "Грант може змінити або розкрити дані, впливаючи на JavaScript-містки, розширення або міжпроцесну комунікацію (наприклад, спільна пам'ять, передача повідомлень, пайпи, сокети) або маніпулюючи нею"
  -
    id: "PCA"
    value: "A"
    url: "https://cornucopia.owasp.org/cards/PCA"
    desc: "Ви вигадали нову атаку проти «Платформи та коду»"
    misc: "Дізнайтеся більше про цю тему у безкоштовних шпаргалках OWASP з безпеки мобільних застосунків, а також у розділі «Якість коду мобільного застосунку» у «Посібнику з тестування безпеки мобільних застосунків» на сайті OWASP MAS"
-
  id: "AA"
  name: "Автентифікація та авторизація"
  cards:
  -
    id: "AA2"
    value: "2"
    url: "https://cornucopia.owasp.org/cards/AA2"
    desc: "Цзе може використовувати застосунок для виконання конфіденційних операцій, оскільки «розблокований ключ» не використовується під час робочого процесу застосунку"
  -
    id: "AA3"
    value: "3"
    url: "https://cornucopia.owasp.org/cards/AA3"
    desc: "Чой може отримати доступ до можливостей, об'єктів, ресурсів або властивостей, до яких він не повинен мати авторизованого доступу, оскільки права або дозволи є надто широкими, не встановлені належним чином або не застосовуються"
  -
    id: "AA4"
    value: "4"
    url: "https://cornucopia.owasp.org/cards/AA4"
    desc: "Вандана може обійти біометричну автентифікацію, оскільки вона налаштована неправильно або реалізована некоректно"
  -
    id: "AA5"
    value: "5"
    url: "https://cornucopia.owasp.org/cards/AA5"
    desc: "Ейман може обійти локальну автентифікацію шляхом патчингу та/або інструментування, оскільки автентифікацію можна усунути патчем або перевантажити"
  -
    id: "AA6"
    value: "6"
    url: "https://cornucopia.owasp.org/cards/AA6"
    desc: "Ананта може виконувати конфіденційні операції без додаткової автентифікації, оскільки вимоги до автентифікації є надто слабкими або відсутніми"
  -
    id: "AA7"
    value: "7"
    url: "https://cornucopia.owasp.org/cards/AA7"
    desc: "Абдулла може обійти автентифікацію, змінивши звичайну послідовність або порядок процесу, виконавши процес у неправильному порядку, маніпулюючи значеннями дати та часу, що використовуються застосунком, або використовуючи дійсні функції в непередбачених цілях"
  -
    id: "AA8"
    value: "8"
    url: "https://cornucopia.owasp.org/cards/AA8"
    desc: "Прамод може перехопити облікові дані шляхом введення в оману, оскільки застосунок є вразливим до атак, таких як Tapjacking, StrandHogg та/або перехоплення схеми URL"
  -
    id: "AA9"
    value: "9"
    url: "https://cornucopia.owasp.org/cards/AA9"
    desc: "Вонг може обійти автентифікацію, оскільки вона не завершується безпечно (тобто за замовчуванням дозволяє неавтентифікований доступ)"
  -
    id: "AAX"
    value: "10"
    url: "https://cornucopia.owasp.org/cards/AAX"
    desc: "Прасад може обійти централізовані засоби контролю автентифікації та авторизації, оскільки вони не застосовуються комплексно до всіх взаємодій"
  -
    id: "AAJ"
    value: "В"
    url: "https://cornucopia.owasp.org/cards/AAJ"
    desc: "Аде може обійти автентифікацію, оскільки вона не забезпечується за допомогою віддаленої кінцевої точки, або не базується на криптографічному примітиві, захищеному прапорцями контролю доступу до сховища ключів"
  -
    id: "AAQ"
    value: "Д"
    url: "https://cornucopia.owasp.org/cards/AAQ"
    desc: "Ріотаро може впровадити та виконати команду, яку застосунок виконає з вищим рівнем привілеїв, без автентифікації або авторизації"
  -
    id: "AAK"
    value: "К"
    url: "https://cornucopia.owasp.org/cards/AAK"
    desc: "Аатіф може впливати на засоби контролю автентифікації або змінювати їх і тому може обходити їх"
  -
    id: "AAA"
    value: "A"
    url: "https://cornucopia.owasp.org/cards/AAA"
    desc: "Ви вигадали нову атаку проти «Автентифікації та авторизації»"
    misc: "Дізнайтеся більше про цю тему у безкоштовних шпаргалках OWASP з безпеки мобільних застосунків, а також у розділі «Архітектури автентифікації мобільних застосунків» у «Посібнику з тестування безпеки мобільних застосунків» на сайті OWASP MAS"
-
  id: "NS"
  name: "Мережа та сховище"
  cards:
  -
    id: "NS2"
    value: "2"
    url: "https://cornucopia.owasp.org/cards/NS2"
    desc: "Метт може переглядати конфіденційні дані журналів застосунку, оскільки оператори журналювання не були видалені або перевірені на безпечність перед випуском у виробниче середовище"
  -
    id: "NS3"
    value: "3"
    url: "https://cornucopia.owasp.org/cards/NS3"
    desc: "Біл може отримати доступ до конфіденційних даних конфіденційних полів із буфера обміну або кешу клавіатури, оскільки буфер обміну не очищується своєчасно, не вимкнено або не обмежено для конфіденційних полів, або кеш клавіатури не вимкнено"
  -
    id: "NS4"
    value: "4"
    url: "https://cornucopia.owasp.org/cards/NS4"
    desc: "Рікардо може витягти дані, збережені застосунком на вкраденому або виведеному з експлуатації пристрої, оскільки він не забезпечує дотримання політик безпеки доступу до пристрою (наприклад, блокування з PIN-кодом, версія застосунку/ОС, деактивація USB-налагодження, шифрування пристрою та рутинг)"
  -
    id: "NS5"
    value: "5"
    url: "https://cornucopia.owasp.org/cards/NS5"
    desc: "Кевін може читати конфіденційні дані, прив'язані до облікових записів користувачів або сесій, шляхом витягування даних, переданих через сторонні бібліотеки та/або сповіщення між застосунком і вбудованими сервісами (наприклад, журнали, сповіщення, резервні копії, кеш, локальна база даних)"
  -
    id: "NS6"
    value: "6"
    url: "https://cornucopia.owasp.org/cards/NS6"
    desc: "Сем може дампити конфіденційні дані з пам'яті, оскільки дані не зберігаються як примітивні типи даних і не перезаписуються випадковими даними після використання, або тому що поля введення застосунку використовують небезпечні SDK для зберігання даних у RAM"
  -
    id: "NS7"
    value: "7"
    url: "https://cornucopia.owasp.org/cards/NS7"
    desc: "Стів може отримати доступ до конфіденційних даних, читаючи резервні копії та/або локальне, внутрішнє/зовнішнє сховище"
  -
    id: "NS8"
    value: "8"
    url: "https://cornucopia.owasp.org/cards/NS8"
    desc: "Мартін може змінити або розкрити конфіденційні дані через небезпечну рефлексію під час читання даних із публічного сховища даних (наприклад, спільних налаштувань), оскільки дані не перевіряються перед читанням застосунком"
  -
    id: "NS9"
    value: "9"
    url: "https://cornucopia.owasp.org/cards/NS9"
    desc: "Адріан може скомпрометувати комунікацію застосунку через проксі, оскільки застосунок не використовує закріплення сертифікатів або реалізує його некоректно"
  -
    id: "NSX"
    value: "10"
    url: "https://cornucopia.owasp.org/cards/NSX"
    desc: "Маартен може скомпрометувати комунікацію між застосунком та зовнішніми сервісами, оскільки застосунок не перевіряє сертифікати та ланцюжки TLS, довіряє небезпечним джерелам, не виконує перевірку імені хоста або ігнорує проблеми верифікації TLS"
  -
    id: "NSJ"
    value: "В"
    url: "https://cornucopia.owasp.org/cards/NSJ"
    desc: "Ніель може скомпрометувати комунікацію, оскільки вона може перейти на незахищений або незашифрований канал, тому що шифрування є необов'язковим, або через слабкі місця у протоколі клієнт-сервер або постачальнику засобів безпеки"
  -
    id: "NSQ"
    value: "Д"
    url: "https://cornucopia.owasp.org/cards/NSQ"
    desc: "Ахмед може читати та змінювати дані в транзиті, оскільки комунікація передається незашифрованим каналом"
  -
    id: "NSK"
    value: "К"
    url: "https://cornucopia.owasp.org/cards/NSK"
    desc: "Тахер може перехоплювати, витягувати або змінювати конфіденційні дані в стані спокою або в транзиті, впливаючи на методи передачі або зберігання даних або маніпулюючи ними"
  -
    id: "NSA"
    value: "A"
    url: "https://cornucopia.owasp.org/cards/NSA"
    desc: "Ви вигадали нову атаку проти «Мереж та сховищ»"
    misc: "Дізнайтеся більше про цю тему у безкоштовних шпаргалках OWASP з безпеки мобільних застосунків, а також у розділі «Мережева комунікація мобільних застосунків» у «Посібнику з тестування безпеки мобільних застосунків» на сайті OWASP MAS"
-
  id: "RS"
  name: "Стійкість"
  cards:
  -
    id: "RS2"
    value: "2"
    url: "https://cornucopia.owasp.org/cards/RS2"
    desc: "Себастьєн може розкрити конфіденційні дані, оскільки застосунок налаштований на журналювання відладочної інформації під час виконання"
  -
    id: "RS3"
    value: "3"
    url: "https://cornucopia.owasp.org/cards/RS3"
    desc: "Тобіас може розкрити конфіденційні дані шляхом дампингу відладочних символів під час виконання застосунку"
  -
    id: "RS4"
    value: "4"
    url: "https://cornucopia.owasp.org/cards/RS4"
    desc: "Тімур може змінити код виробничого випуску, оскільки код застосунку не підписаний належним чином дійсним виробничим сертифікатом"
  -
    id: "RS5"
    value: "5"
    url: "https://cornucopia.owasp.org/cards/RS5"
    desc: "Маттео може обійти засоби контролю доступу та викликати функціональність, оскільки відладка залишається увімкненою у виробничій збірці"
  -
    id: "RS6"
    value: "6"
    url: "https://cornucopia.owasp.org/cards/RS6"
    desc: "Йорен може обійти засоби контролю доступу, оскільки засоби захисту від відладки недостатньо надійні відповідно до рекомендацій або передбачуваних зусиль потенційного зловмисника"
  -
    id: "RS7"
    value: "7"
    url: "https://cornucopia.owasp.org/cards/RS7"
    desc: "Ерленд може скомпрометувати застосунок, запускаючи його в емуляторі, оскільки захист від емуляторів недостатньо надійний відповідно до рекомендацій або передбачуваних зусиль потенційного зловмисника"
  -
    id: "RS8"
    value: "8"
    url: "https://cornucopia.owasp.org/cards/RS8"
    desc: "Карлос може виконати зворотний інжиніринг застосунку, оскільки засоби захисту від зворотного інжинірингу недостатньо надійні відповідно до рекомендацій або передбачуваних зусиль потенційного зловмисника"
  -
    id: "RS9"
    value: "9"
    url: "https://cornucopia.owasp.org/cards/RS9"
    desc: "Шон може виконати зворотний інжиніринг застосунку, оскільки обфускація коду недостатньо надійна відповідно до рекомендацій або передбачуваних зусиль потенційного зловмисника"
  -
    id: "RSX"
    value: "10"
    url: "https://cornucopia.owasp.org/cards/RSX"
    desc: "Хуан може обійти виявлення джейлбрейку та рут-прав і виконати адміністративні функції для обходу перевірок цілісності та засобів контролю доступу й активації функціональності застосунку"
  -
    id: "RSJ"
    value: "В"
    url: "https://cornucopia.owasp.org/cards/RSJ"
    desc: "Пекка може скомпрометувати цілісність сховища, оскільки перевірки цілісності файлів недостатньо надійні відповідно до рекомендацій або передбачуваних зусиль потенційного зловмисника"
  -
    id: "RSQ"
    value: "Д"
    url: "https://cornucopia.owasp.org/cards/RSQ"
    desc: "Тітус може усунути патчем критичну функціональність, оскільки перевірки цілісності під час виконання недостатньо надійні відповідно до рекомендацій або передбачуваних зусиль потенційного зловмисника"
  -
    id: "RSK"
    value: "К"
    url: "https://cornucopia.owasp.org/cards/RSK"
    desc: "Шеріф може впливати на засоби захисту від зворотного інжинірингу та захист під час виконання або змінювати їх і тому може обходити їх"
  -
    id: "RSA"
    value: "A"
    url: "https://cornucopia.owasp.org/cards/RSA"
    desc: "Ви вигадали нову атаку проти «Стійкості»"
    misc: "Дізнайтеся більше про цю тему у безкоштовних шпаргалках OWASP з безпеки мобільних застосунків, а також у розділі «Модифікація мобільних застосунків та зворотний інжиніринг» у «Посібнику з тестування безпеки мобільних застосунків» на сайті OWASP MAS"
-
  id: "CRM"
  name: "Криптографія"
  cards:
  -
    id: "CRM2"
    value: "2"
    url: "https://cornucopia.owasp.org/cards/CRM2"
    desc: "Лесего може скомпрометувати криптографічні операції та ресурси, оскільки ключі використовуються повторно для кількох цілей або не використовуються відповідно до цілі, для якої вони були створені"
  -
    id: "CRM3"
    value: "3"
    url: "https://cornucopia.owasp.org/cards/CRM3"
    desc: "Емері може отримати доступ до даних, оскільки вони були обфусковані, а не зашифровані за допомогою затвердженої криптографічної функції"
  -
    id: "CRM4"
    value: "4"
    url: "https://cornucopia.owasp.org/cards/CRM4"
    desc: "Енселм може змінити конфіденційні дані (збережені або в транзиті), оскільки вони не підлягають перевірці цілісності"
  -
    id: "CRM5"
    value: "5"
    url: "https://cornucopia.owasp.org/cards/CRM5"
    desc: "Ораче може передбачити значення початкового числа, що використовується для генерації криптографічних ключів, і тим самим скомпрометувати криптографічний ключ"
  -
    id: "CRM6"
    value: "6"
    url: "https://cornucopia.owasp.org/cards/CRM6"
    desc: "Коуті може витягти конфіденційні дані, оскільки використовуваний криптографічний ключ є жорстко закодованим або зберігається небезпечно, наприклад у локальному, внутрішньому/зовнішньому сховищі"
  -
    id: "CRM7"
    value: "7"
    url: "https://cornucopia.owasp.org/cards/CRM7"
    desc: "Рамзі може отримати доступ до збережених конфіденційних даних, оскільки вони не зашифровані належним чином"
  -
    id: "CRM8"
    value: "8"
    url: "https://cornucopia.owasp.org/cards/CRM8"
    desc: "Адель може передбачити та використати криптографічні ключі застосунку, оскільки вони є недостатньо довгими та випадковими, можуть бути перебрані або отримані з відомих значень"
  -
    id: "CRM9"
    value: "9"
    url: "https://cornucopia.owasp.org/cards/CRM9"
    desc: "Фаді може обійти криптографічні засоби контролю, оскільки вони не завершуються безпечно (тобто за замовчуванням залишаються незахищеними)"
  -
    id: "CRMX"
    value: "10"
    url: "https://cornucopia.owasp.org/cards/CRMX"
    desc: "Еш може зламати криптографію, оскільки вона недостатньо надійна відповідно до рекомендацій або передбачуваних зусиль потенційного зловмисника"
  -
    id: "CRMJ"
    value: "В"
    url: "https://cornucopia.owasp.org/cards/CRMJ"
    desc: "Гасан може витягти або змінити конфіденційні дані, оскільки функції зберігання та/або шифрування є слабкими, застарілими або використовуються некоректно"
  -
    id: "CRMQ"
    value: "Д"
    url: "https://cornucopia.owasp.org/cards/CRMQ"
    desc: "Саймон може обійти функції хешування та шифрування, оскільки вони є власними та/або реалізовані неналежним чином"
  -
    id: "CRMK"
    value: "К"
    url: "https://cornucopia.owasp.org/cards/CRMK"
    desc: "Тарік може впливати на криптографічні операції або змінювати їх і тому може обходити їх"
  -
    id: "CRMA"
    value: "A"
    url: "https://cornucopia.owasp.org/cards/CRMA"
    desc: "Ви вигадали нову атаку проти «Криптографії»"
    misc: "Дізнайтеся більше про цю тему у безкоштовних шпаргалках OWASP з безпеки мобільних застосунків, а також у розділі «Криптографія мобільних застосунків» у «Посібнику з тестування безпеки мобільних застосунків» на сайті OWASP MAS"
-
  id: "CM"
  name: "Корнукопія"
  cards:
  -
    id: "CM2"
    value: "2"
    url: "https://cornucopia.owasp.org/cards/CM2"
    desc: "Гарт може зменшити конфіденційність користувачів застосунку, оскільки застосунок не є прозорим щодо збору та використання даних застосунку в стислому, легкодоступному та зрозумілому вигляді"
  -
    id: "CM3"
    value: "3"
    url: "https://cornucopia.owasp.org/cards/CM3"
    desc: "Ельза може зменшити конфіденційність користувачів застосунку, оскільки застосунок не дозволяє користувачу легко керувати, видаляти та змінювати свої дані, змінювати налаштування конфіденційності та повторно запитувати згоду, коли потрібно більше даних"
  -
    id: "CM4"
    value: "4"
    url: "https://cornucopia.owasp.org/cards/CM4"
    desc: "Єлизавета може зменшити конфіденційність користувачів застосунку, оскільки застосунок надсилає надто багато персональних даних без згоди користувача до нижчестоящих сервісів, що перебувають поза контролем користувача"
  -
    id: "CM5"
    value: "5"
    url: "https://cornucopia.owasp.org/cards/CM5"
    desc: "Дебаргхайя може зменшити конфіденційність користувачів застосунку, оскільки застосунок перевикористовує персональну інформацію (наприклад, ідентифікатори пристроїв, IP-адреси, поведінкові шаблони), зібрану з міркувань безпеки, для обслуговування комерційних інтересів без згоди"
  -
    id: "CM6"
    value: "6"
    url: "https://cornucopia.owasp.org/cards/CM6"
    desc: "Кім може зменшити конфіденційність користувачів застосунку, оскільки застосунок перевикористовує біометричну інформацію (наприклад, відбитки пальців, дані розпізнавання обличчя тощо), зібрану з міркувань безпеки, для обслуговування комерційних інтересів"
  -
    id: "CM7"
    value: "7"
    url: "https://cornucopia.owasp.org/cards/CM7"
    desc: "Гастон може виконувати зловмисні дії через перенаправлення інтентів, оскільки інтент не є належним чином очищеним та незмінним"
  -
    id: "CM8"
    value: "8"
    url: "https://cornucopia.owasp.org/cards/CM8"
    desc: "Роксана може виконати довільне перезаписування файлів і потенційно запустити зловмисний код через обхід шляху, оскільки цільовий шлях і директорія не перевіряються належним чином"
  -
    id: "CM9"
    value: "9"
    url: "https://cornucopia.owasp.org/cards/CM9"
    desc: "Алессандро може використати застосунок, скориставшись переповненням буфера та витоком пам'яті для запису стороннього коду в адресний простір мобільного коду"
  -
    id: "CMX"
    value: "10"
    url: "https://cornucopia.owasp.org/cards/CMX"
    desc: "Карлос може використовувати сервіси сповіщень застосунку для запуску фішингових кампаній, оскільки сповіщення не очищуються та не перевіряються відповідно до найкращих практик"
  -
    id: "CMJ"
    value: "В"
    url: "https://cornucopia.owasp.org/cards/CMJ"
    desc: "Луїс може впливати на криптографічні методи або змінювати їх, щоб пошкодити дані інших користувачів, оскільки цілісність зашифрованих даних не перевіряється перед тим, як вони передаються зовнішнім сервісам"
  -
    id: "CMQ"
    value: "Д"
    url: "https://cornucopia.owasp.org/cards/CMQ"
    desc: "Віктор може модифікувати застосунок і використовувати його для розповсюдження зловмисного коду, оскільки перевірки цілісності під час виконання недостатньо надійні відповідно до рекомендацій або передбачуваних зусиль потенційного зловмисника"
  -
    id: "CMK"
    value: "К"
    url: "https://cornucopia.owasp.org/cards/CMK"
    desc: "Рубен може використовувати застосунок без модифікацій для розповсюдження зловмисного коду, оскільки методи передачі та зберігання не виконують належного очищення та перевірки даних"
  -
    id: "CMA"
    value: "A"
    url: "https://cornucopia.owasp.org/cards/CMA"
    desc: "Ви вигадали нову атаку будь-якого типу"
    misc: "Дізнайтеся більше про цю тему у безкоштовних шпаргалках OWASP з безпеки мобільних застосунків, а також у розділі «Захист конфіденційності користувачів мобільних застосунків» у «Посібнику з тестування безпеки мобільних застосунків» на сайті OWASP MAS"
-
  id: "WC"
  name: "Джокер"
  cards:
  -
    id: "JOAM"
    value: "A"
    url: "https://cornucopia.owasp.org/cards/JOAM"
    card: "Joker"
    desc: "Старр може вплинути, змінити або позначитися на застосунці таким чином, що він більше не відповідає правовим, регуляторним, договірним або іншим вимогам"
    misc: "Чи думали ви про те, щоб стати індивідуальним членом OWASP? Всі інструменти, посібники та місцеві зустрічі є безкоштовними для всіх, але індивідуальне членство допомагає підтримувати роботу OWASP"
  -
    id: "JOBM"
    value: "B"
    url: "https://cornucopia.owasp.org/cards/JOBM"
    card: "Joker"
    desc: "Меллорі може зловмисно використовувати застосунок, встановлений на пристрої Боба, для стеження, шпигунства, підслуховування, дистанційного керування, відстеження або іншого моніторингу Боба без його згоди та/або повідомлення"
    misc: "Досліджуйте вразливості та дізнайтеся, як їх можна виправити, використовуючи безкоштовні еталонні застосунки MASTG на сайті OWASP MAS"
paragraphs:
-
  id: "Common"
  name: "Common"
  sentences:
  -
    id: "NoCard"
    text: "Немає карти"
  -
    id: "Title"
    text: "Mobile App Edition v1.1-UK"
  -
    id: "Title_full"
    text: "OWASP® Cornucopia Mobile App Edition v1.1-UK"
  -
    id: "T00010"
    text: "OWASP® Cornucopia є механізмом, який допомагає командам розробки програмного забезпечення ідентифікувати вимоги безпеки в Agile, традиційних та формальних процесах розробки."
  -
    id: "T00020"
    text: "Автори"
  -
    id: "T00100"
    text: "Подяки"
  -
    id: "T00110"
    text: "Адаму Шостаку та команді Microsoft SDL Team за \"Гра з моделювання загрози підвищення привілеїв\", опубліковану під ліцензією Creative Commons Attribution, як натхнення для Корнукопії, з якої багато ідей, особливо із теорії ігор, було скопійовано."
  -
    id: "T00120"
    text: "Коліну Ватсон за те, що він придумав Корнукопію, на основі якої створено OWASP Cornucopia Mobile App Edition."
  -
    id: "T00130"
    text: "Контрібьюторам, прихильникам, спонсорам та волонтерам за OWASP MASVS/MASTG, Перелік та класифікація загальних шаблонів атак Mitre (CAPEC™), та SAFECode \"Практичні історії безпеки та завдання безпеки для оточень із гнучкою розробкою\" які були використовані у наданих перехрестних посиланнях."
  -
    id: "T00145"
    text: "Поточним та попереднім контрібьюторам та лідерам OWASP® Корнукопії, особливо тим задіяним у найостаннішому оновленню перехрестних посилань, створенню онлайн версій, і написанні сценаріїв для динамічного генерованих вихідних файлів Корнукопії."
  -
    id: "T00150"
    text: "Blackfoot (UK) Limited за створення та надання файлів дизайну, підготовлених до друку, Тому Бреннану та фонду OWASP® за ініціювання створення коробки та листівки з брендом OWASP, а також Secure Delivery Ltd за розробку та надання Copi, платформи для гри в Cornucopia та EoP онлайн.."
  -
    id: "T00161"
    text: "(продовження на стор. 20)"
  -
    id: "T00162"
    text: "(продовження зі стор. 10)"
  -
    id: "T00200"
    text: "Вступ"
  -
    id: "T00210"
    text: "Ідея Cornucopia полягає в тому, щоб допомогти командам розробки, особливо тим, які використовують методології Agile, визначати вимоги до безпеки застосунків та розробляти користувацькі сценарії на основі безпеки."
  -
    id: "T00220"
    text: "OWASP Cornucopia Mobile App Edition використовує ті самі концепції та стратегію гри, що й OWASP Cornucopia Website App Edition, але створено для команд розробки мобільних додатків. OWASP Cornucopia вдохновлена грою \"Підвищення привілеїв: Гра з моделювання загроз (EoP)\"."
  -
    id: "T00240"
    text: "OWASP Cornucopia намагається ввести ідеї моделювання загроз у команди розробки мобільних додатків, які використовують методології Agile або зосереджуються на слабких місцях мобільних застосунків більше, ніж на інших типах програмних вразливостей."
  -
    id: "T00300"
    text: "Колода карт (набір)"
  -
    id: "T00310"
    text: "Сценарії карток мають охоплювати всі вимоги MASVS 2.0, всі тести MASTG та будь-які додаткові рекомендації з посібників з безпечного кодування для Android та IOS. Це було зроблено для того, щоб гра максимально відповідала останнім рекомендаціям щодо безпечної розробки мобільних пристроїв. Однак важливо пам'ятати, що рекомендації та вимоги безпеки завжди змінюються, і що гру, перш за все, слід використовувати як допоміжний засіб під час моделювання загроз для мобільних додатків, а не як повний посібник з вимог та рекомендацій безпеки."
  -
    id: "T00311"
    text: "Масті Cornucopia Mobile App Edition базуються на розділах Стандарту перевірки безпеки мобільних додатків."
  -
    id: "T00320"
    text: "Вони забезпечили п'ять мастей, а шоста під назвою «Корнукопія» була створена як козирна масть:"
  -
    id: "T00330"
    text: "Платформа та код (PC)"
  -
    id: "T00340"
    text: "Автентифікація та авторизація (АА)"
  -
    id: "T00350"
    text: "Мережа та сховище (NС)"
  -
    id: "T00360"
    text: "Стійкість (RS)"
  -
    id: "T00370"
    text: "Криптографія (CRM)"
  -
    id: "T00380"
    text: "Корнукопія (CM)"
  -
    id: "T00390"
    text: "Подібно до покерних карт, кожна масть містить 13 карт (Туз, 2-10, Валет, Дама та Король)."
  -
    id: "T00400"
    text: "Також є дві карти Джокера, як і у виданні Cornucopia Website App Edition."
  -
    id: "T00500"
    text: "Відповідності"
  -
    id: "T00510"
    text: "Іншою метою Mobile Cornucopia є зв'язок атак із вимогами та методами верифікації."
  -
    id: "T00520"
    text: "Крім кодів вимог MASVS 2.0 та кодів тестів MASTG, карти також містять посилання на ідентифікатори шаблонів атак CAPEC™, які своєю чергою відповідають CWE."
  -
    id: "T00530"
    text: "Кожна карта також відповідає 36 основним захисним сценаріям у документі SAFECode, що допомагає командам створювати власні сценарії безпеки для використання в Agile-процесах."
  -
    id: "T00600"
    text: "Стратегія гри"
  -
    id: "T00610"
    text: "Окрім відмінностей у змісті, правила гри практично ідентичні правилам видання Cornucopia Website App Edition."
  -
    id: "T01000"
    text: "Залишити відгук"
  -
    id: "T01010"
    text: "Якщо у вас є ідеї або відгуки щодо використання OWASP® Mobile Cornucopia, будь ласка, поділіться ними."
  -
    id: "T01020"
    text: "Ще краще, якщо ви створите альтернативні версії карт або виготовите професійні версії, готові до друку, — поділіться ними з волонтерами, які створили це видання, та з широкою спільнотою розробників і фахівців з безпеки застосунків."
  -
    id: "T01030"
    text: "Найкраще місце для обговорення або участі — це список/група проєкту OWASP:"
  -
    id: "T01040"
    text: "Список/Група"
  -
    id: "T01050"
    text: "Домашня сторінка проєкту"
  -
    id: "T01060"
    text: "Усі документи та інструменти OWASP безкоштовні для завантаження та використання."
  -
    id: "T01070"
    text: "OWASP® Mobile Cornucopia ліцензовано за ліцензією Creative Commons Attribution-ShareAlike 3.0."
  -
    id: "T01100"
    text: "Інструкції"
  -
    id: "T01110"
    text: "Текст на кожній карті описує атаку, а зловмиснику присвоюється ім'я, унікальне для всіх карт."
  -
    id: "T01120"
    text: "Ім'я може представляти комп'ютерну систему (наприклад, базу даних, файлову систему, інший застосунок, пов'язаний сервіс, ботнет), окрему особу (наприклад, громадянина, клієнта, покупця, працівника, злочинця, шпигуна) або навіть групу людей (наприклад, конкуруючу організацію, активістів зі спільною метою)."
  -
    id: "T01130"
    text: "Зловмисник може бути віддаленим на іншому пристрої/місці або локальним/внутрішнім з доступом до того самого пристрою, хоста або мережі, на якій працює застосунок."
  -
    id: "T01140"
    text: "Зловмисник завжди названий на початку кожного опису"
  -
    id: "T01150"
    text: "Наприклад:"
  -
    id: "T01160"
    text: "Вонг може обійти автентифікацію, оскільки вона не відмовляє безпечно."
  -
    id: "T01170"
    text: "Це означає, що зловмисник Вонг може увійти до застосунку без надання облікових даних, оскільки механізм входу дозволяє доступ у разі збою."
  -
    id: "T01180"
    text: "Атаки були переважно взяті з посібника тестування мобільних застосунків MASVS 2.0 та посібників із безпечного кодування для Android та iOS"
  -
    id: "T01200"
    text: "Відповідності між атаками та посібниками наведені на більшості карт:"
  -
    id: "T01210"
    text: "Тестові коди з Посібника тестування мобільних застосунків MASVS:"
  -
    id: "T01220"
    text: “Ідентифікатори верифікації у «Стандарті перевірки безпеки мобільних застосунків (MASVS) 2.0 для мобільних застосунків»”
  -
    id: "T01240"
    text: “Ідентифікатори у «Переліку та класифікації загальних шаблонів атак (CAPEC™)», v3.9, Mitre Corporation, листопад 2015”
  -
    id: "T01250"
    text: "Сценарії, орієнтовані на безпеку, у «Практичних захисних сценаріях та завданнях з безпеки для Agile-середовищ розробки», SAFECode, липень 2012"
  -
    id: "T01260"
    text: "Відповідність означає, що атака включена до зазначеного елемента, але не обов'язково охоплює весь його зміст. "
  -
    id: "T01270"
    text: "Для структурованих даних, як-от CAPEC, надається найбільш конкретне посилання, але іноді наводиться перехресне посилання з більш конкретними (дочірніми) прикладами."
  -
    id: "T01280"
    text: "На шести Тузах та двох Джокерах відповідностей немає. "
  -
    id: "T01290"
    text: "Натомість ці карти містять загальні поради, виділені курсивом."
  -
    id: "T01300"
    text: "У Cornucopia можна грати різними способами. "
  -
    id: "T01301"
    text: "Щодо правил гри, продовжте читання на сторінках: 11-19."
  -
    id: "T01400"
    text: "Підготовка"
  -
    id: "T01410"
    text: "Отримайте колоду або роздрукуйте власну колоду карток Cornucopia (див. сторінку 2 цього документа) та розділіть/виріжте картки"
  -
    id: "T01411"
    text: "Використовуйте картки з цього набору"
  -
    id: "T01420"
    text: "Визначте застосунок або процес застосунку для перевірки; це може бути концепція, дизайн або фактична реалізація"
  -
    id: "T01430"
    text: "Створіть діаграму потоків даних, користувацькі сценарії або інші артефакти для допомоги у перевірці"
  -
    id: "T01440"
    text: "Визначте та запросіть групу з 3-6 архітекторів, розробників, тестувальників та інших зацікавлених сторін бізнесу та сядьте навколо столу (спробуйте включити когось, хто достатньо знайомий з безпекою застосунків)"
  -
    id: "T01450"
    text: "Підготуйте призи (золоті зірки, шоколад, піцу, пиво або квіти залежно від культури вашого офісу)"
  -
    id: "T01500"
    text: "Гра"
  -
    id: "T01510"
    text: "Одна масть — Корнукопія — є козирною."
  -
    id: "T01520"
    text: "Туз старший (тобто він перемагає Королів)."
  -
    id: "T01530"
    text: "Буде корисно, якщо є спостерігач без ходу, який документує питання та рахунки."
  -
    id: "T01540"
    text: "Вилучіть Джокерів та кілька карток з низьким балом (2, 3, 4) з масті Корнукопія, щоб у кожного гравця було однакова кількість карток"
  -
    id: "T01550"
    text: "Перемішайте колоду та роздайте всі картки"
  -
    id: "T01560"
    text: "Для початку випадковим чином оберіть гравця, який зіграє першу картку — він може зіграти будь-яку картку зі своїх рук, крім козирної масті — Корнукопія"
  -
    id: "T01570"
    text: "Щоб зіграти картку, кожен гравець повинен зачитати її вголос та пояснити (дивіться онлайн Wiki Deck для підказок), як загроза може застосовуватися (гравець отримує очко за атаки, які можуть спрацювати і які група вважає реальними помилками) — не намагайтеся думати про засоби захисту на цьому етапі, і не виключайте загрозу лише через переконання, що вона вже зменшена — хтось нотує картку та записує виявлені проблеми"
  -
    id: "T01580"
    text: "Грайте за годинниковою стрілкою, кожна особа повинна зіграти картку таким самим чином; якщо у вас є будь-яка картка відповідної провідної масті, ви повинні зіграти одну з них, інакше можна зіграти картку будь-якої іншої масті. "
  -
    id: "T01590"
    text: "Лише вища картка тієї самої масті або найвища картка козирної масті Корнукопія виграє раунд."
  -
    id: "T01600"
    text: "Особа, яка виграє раунд, веде наступний раунд (тобто вона грає першою), і таким чином визначає наступну провідну масть"
  -
    id: "T01610"
    text: "Повторюйте, доки всі картки не будуть зіграні"
  -
    id: "T01700"
    text: "Підрахунок очок"
  -
    id: "T01710"
    text: "Мета — виявляти застосовні загрози та виграти раунди:"
  -
    id: "T01720"
    text: "Нарахуйте +1 за кожну картку, яку ви можете визначити як реальну загрозу для розглянутого застосунку"
  -
    id: "T01730"
    text: "Нарахуйте +1, якщо ви виграли раунд"
  -
    id: "T01740"
    text: "Після того, як усі картки зіграні, перемагає той, хто набрав найбільше очок"
  -
    id: "T01800"
    text: "Завершення"
  -
    id: "T01810"
    text: "Перегляньте всі застосовні загрози та відповідні вимоги безпеки"
  -
    id: "T01820"
    text: "Створіть користувацькі сценарії, специфікації та тестові кейси відповідно до вашої методології розробки."
  -
    id: "T01900"
    text: "Альтернативні правила гри"
  -
    id: "T01910"
    text: "Якщо ви новачок у цій грі, спочатку вилучіть Тузів та дві картки Джокера."
  -
    id: "T01920"
    text: "Поверніть картки Джокера, коли люди більше ознайомляться з процесом."
  -
    id: "T01930"
    text: “Крім правил гри «козирні карти», описаних вище, які дуже схожі на EoP, колода також може використовуватися як гра «двадцять одне» (також відома як «понтон» або «блекджек»), яка зазвичай зменшує кількість карток у кожному раунді.”
  -
    id: "T01940"
    text: "Потренуйтеся на уявному застосунку або навіть майбутньому запланованому застосунку, а не намагайтеся знайти вади існуючих застосунків, поки учасники не будуть задоволені корисністю гри."
  -
    id: "T01950"
    text: "Розгляньте можливість грати лише з однією мастю для коротшої сесії — але спробуйте охопити всі масті для кожного проєкту. "
  -
    id: "T01960"
    text: "Або ще краще зіграйте лише один раунд з деякими заздалегідь відібраними картками та рахуйте лише за здатність визначати вимоги безпеки. "
  -
    id: "T01970"
    text: "Можливо, проводьте по одній грі кожної масті щодня протягом тижня або близько того, якщо учасники не можуть виділити достатньо часу для повної колоди."
  -
    id: "T01980"
    text: "Деякі команди надали перевагу зіграти повний раунд карток, а потім обговорити написане на картках після кожного раунду (замість після кожного ходу гравця)."
  -
    id: "T01990"
    text: "Ще одна пропозиція: якщо гравець не може визначити актуальність картки, дозвольте іншим гравцям пропонувати ідеї, і потенційно дозвольте їм отримати очко за картку. "
  -
    id: "T02000"
    text: "Розгляньте можливість нарахування додаткових очок за особливо гарні внески."
  -
    id: "T02010"
    text: "Ви навіть можете грати самостійно. "
  -
    id: "T02020"
    text: "Просто використовуйте картки як генератори ідей. "
  -
    id: "T02030"
    text: "Однак залучення більшої кількості людей буде корисним."
  -
    id: "T02040"
    text: "У керівництві Microsoft з EoP рекомендується шахрайство як хороша ігрова стратегія."
  -
    id: "T02600"
    text: "Поширені запитання"
  -
    id: "T02610"
    text: "1. Чи можу я скопіювати або відредагувати гру?"
  -
    id: "T02620"
    text: "Так, звичайно."
  -
    id: "T02630"
    text: "Усі матеріали OWASP безкоштовні для використання за умови дотримання ліцензії Creative Commons Attribution-ShareAlike 3.0. "
  -
    id: "T02640"
    text: "Можливо, якщо ви створите нову версію, ви могли б подарувати її проєкту OWASP® Cornucopia?"
  -
    id: "T02650"
    text: "2. Як я можу долучитися?"
  -
    id: "T02660"
    text: "Будь ласка, надсилайте ідеї або пропозиції допомоги на поштовий список проєкту."
  -
    id: "T02670"
    text: "3. Як були обрані імена зловмисників?"
  -
    id: "T02680"
    text: "EoP починає кожен опис зі слів на кшталт «Зловмисник може...»,"
  -
    id: "T02690"
    text: "але Колін Вотсон використав особисті імена в Cornucopia, які можна розглядати як зовнішніх або внутрішніх людей або псевдоніми комп'ютерних систем."
  -
    id: "T02700"
    text: "Аналогічно, імена у виданні Mobile App Edition відображають аспект спільноти OWASP."
  -
    id: "T02710"
    text: "Тому, крім «Боба та Меллорі», імена зловмисників взяті з членів глобальної ради та ради ЄС OWASP 2024 року, співробітників OWASP, авторів та учасників OWASP Cornucopia Mobile App Edition та лідерів розділів OWASP по всьому світу."
  -
    id: "T02720"
    text: "Культурне та гендерне різноманіття просто відображає ці джерела імен, та"
  -
    id: "T02730"
    text: "не є репрезентативним для всього світу."
  -
    id: "T02750"
    text: "4. Чому на лицьовому боці карток немає зображень?"
  -
    id: "T02760"
    text: "На картках є досить багато тексту, і перехресні посилання також займають місце."
  -
    id: "T02770"
    text: "Але було б чудово мати додаткові елементи дизайну."
  -
    id: "T02780"
    text: "Є добровольці?"
  -
    id: "T02790"
    text: "5. Чи ранжуються атаки за номером на картці?"
  -
    id: "T02800"
    text: "Лише приблизно."
  -
    id: "T02810"
    text: "Ризик залежить від застосунку та організації через різні вимоги до безпеки та відповідності, тому ваша власна оцінка серйозності може розмістити картки в іншому порядку, ніж номери на них."
  -
    id: "T02820"
    text: "6. Скільки часу потрібно для проведення раунду з повною колодою?"
  -
    id: "T02830"
    text: "Це залежить від обсягу застосунку, обсягу обговорення та наскільки гравці знайомі з концепціями безпеки застосунків."
  -
    id: "T02840"
    text: "Але, можливо, відведіть 1,5–2,0 години для 4–6 осіб."
  -
    id: "T02850"
    text: "7. Які люди повинні грати в гру?"
  -
    id: "T02860"
    text: "Завжди намагайтеся мати суміш ролей, які можуть вносити альтернативні точки зору."
  -
    id: "T02870"
    text: "Але включіть когось, хто має достатні знання термінології вразливостей застосунків. "
  -
    id: "T02880"
    text: "Інакше намагайтеся включити суміш архітекторів, розробників, тестувальників та відповідного менеджера проєкту або власника бізнесу."
  -
    id: "T02890"
    text: "8. Хто повинен робити нотатки та записувати рахунки?"
  -
    id: "T02900"
    text: "Краще, якщо хтось інший, хто не грає в гру, робить нотатки про визначені вимоги та обговорювані питання."
  -
    id: "T02910"
    text: "Це може бути використано як навчання для молодшого розробника або виконано менеджером проєкту."
  -
    id: "T02920"
    text: "Деякі організації зробили запис для подальшого перегляду, коли вимоги записуються більш формально."
  -
    id: "T02930"
    text: "9. Чи завжди потрібно використовувати повну колоду карток?"
  -
    id: "T02940"
    text: "Ні. "
  -
    id: "T02950"
    text: "Менша колода грається швидше. "
  -
    id: "T02960"
    text: "Почніть свою першу гру лише з достатньою кількістю карток для двох або трьох раундів. "
  -
    id: "T02970"
    text: "Завжди розглядайте можливість видалення карток, які зовсім не підходять для цільового застосунку або функції, що перевіряється. "
  -
    id: "T02980"
    text: "Під час перших кількох ігор зазвичай краще видалити Тузів та два Джокери."
  -
    id: "T02990"
    text: "Також зазвичай грають без козирної масті, поки люди більше не ознайомляться з ідеєю."
  -
    id: "T03000"
    text: “10. Що мають робити гравці, коли у них є картка Туза з написом «вигадав нову атаку X»?”
  -
    id: "T03010"
    text: "Гравець може вигадати будь-яку атаку, яку вважає дійсною, але вона має відповідати масті картки (наприклад, Платформа та код)."
  -
    id: "T03020"
    text: "Для гравців, які вперше грають у цю гру, краще спочатку видалити їх (дивіться також FAQ 9)."
  -
    id: "T03850"
    text: "Наполегливі співробітники OWASP."
