    id: "T02600"
    text: "Поширені запитання"
  -
    id: "T02610"
    text: "1. Чи можна копіювати або редагувати гру?"
  -
    id: "T02620"
    text: "Так, звичайно."
  -
    id: "T02630"
    text: "Усі матеріали OWASP безкоштовні для використання за умови дотримання ліцензії Creative Commons Attribution-ShareAlike 3.0. "
  -
    id: "T02640"
    text: "Можливо, якщо ви створите нову версію, ви могли б пожертвувати її проекту OWASP® Cornucopia?"
  -
    id: "T02650"
    text: "2. Як я можу взяти участь?"
  -
    id: "T02660"
    text: "Будь ласка, надсилайте ідеї або пропозиції допомоги до списку розсилки проекту."
  -
    id: "T02670"
    text: "3. Як були обрані імена зловмисників?"
  -
    id: "T02680"
    text: "EoP починає кожен опис зі слів на кшталт «Зловмисник може...». "
  -
    id: "T02690"
    text: "Вони мають бути сформульовані як атака, але мені не подобалася анонімна термінологія — я хотів чогось більш захоплюючого, тому використовував особисті імена. "
  -
    id: "T02700"
    text: "Їх можна уявляти як зовнішніх або внутрішніх людей або псевдоніми для комп'ютерних систем. Але замість просто випадкових імен я подумав, як вони можуть відображати аспект спільноти OWASP. "
  -
    id: "T02710"
    text: "Тому, крім «Аліси та Боба», я використовую особисті (власні) імена поточних та недавніх співробітників OWASP і членів ради директорів (призначених у довільному порядку), а потім випадковим чином відібрав решту 50 або близько того імен із поточного списку платних індивідуальних членів OWASP. "
  -
    id: "T02720"
    text: "Жодне ім'я не використовувалося більше одного разу, а де люди мали два особисті імені, я відкидав одну частину, щоб ніхто не міг бути легко ідентифікований. "
  -
    id: "T02730"
    text: "Імена не були навмисно призначені до будь-якої конкретної атаки, захисту або вимоги. Культурна та гендерна суміш просто відображає ці джерела імен і не призначена бути репрезентацією всього світу."
  -
    id: "T02740"
    text: "У v1.20 ім'я на VE-10 змінилося, щоб відобразити нового співкерівника проекту — ця карта також є єдиною з двома іменами в описі атаки."
  -
    id: "T02750"
    text: "4. Чому на лицьових сторонах карт немає зображень?"
  -
    id: "T02760"
    text: "На картах досить багато тексту, і перехресні посилання також займають місце."
  -
    id: "T02770"
    text: "Але було б чудово мати додаткові елементи дизайну."
  -
    id: "T02790"
    text: "5. Чи ранжуються атаки за номером на карті?"
  -
    id: "T02800"
    text: "Лише приблизно."
  -
    id: "T02810"
    text: "Ризик залежатиме від застосунку та організації через різні вимоги безпеки та відповідності, тому ваша власна оцінка серйозності може розмістити карти в іншому порядку, ніж числа на картах."
  -
    id: "T02820"
    text: "6. Скільки часу займає гра в раунд карт з повною колодою?"
  -
    id: "T02830"
    text: "Це залежить від обсягу застосунку, кількості обговорень та того, наскільки гравці знайомі з концепціями безпеки застосунків."
  -
    id: "T02840"
    text: "Але, можливо, передбачте від 1,5 до 2,0 годин для 4-6 осіб."
  -
    id: "T02850"
    text: "7. Які люди повинні грати в гру?"
  -
    id: "T02860"
    text: "Завжди намагайтеся мати суміш ролей, які можуть вносити альтернативні перспективи."
  -
    id: "T02870"
    text: "Але включіть когось, хто має достатні знання термінології вразливостей застосунків. "
  -
    id: "T02880"
    text: "В іншому випадку намагайтеся включити суміш архітекторів, розробників, тестувальників та відповідного менеджера проекту або власника бізнесу."
  -
    id: "T02890"
    text: "8. Хто повинен робити нотатки та записувати рахунок?"
  -
    id: "T02900"
    text: "Краще, якщо хтось інший, хто не грає у гру, робить нотатки про виявлені вимоги та обговорені проблеми."
  -
    id: "T02910"
    text: "Це може бути використано як навчання для молодшого розробника або виконано менеджером проекту."
  -
    id: "T02920"
    text: "Деякі організації робили запис для перегляду пізніше, коли вимоги написані більш формально."
  -
    id: "T02930"
    text: "9. Чи завжди слід використовувати повну колоду карт?"
  -
    id: "T02940"
    text: "Ні. "
  -
    id: "T02950"
    text: "Менша колода грається швидше. "
  -
    id: "T02960"
    text: "Розпочніть свою першу гру лише з достатньою кількістю карт для двох або трьох раундів. "
  -
    id: "T02970"
    text: "Завжди розглядайте можливість вилучення карт, які взагалі не підходять для цільового застосунку або функції, що розглядається. "
  -
    id: "T02980"
    text: "Для перших кількох ігор зазвичай краще також вилучити Тузів та двох Джокерів."
  -
    id: "T02990"
    text: "Також зазвичай краще грати без козирної масті, поки люди не ознайомляться більш детально з ідеєю."
  -
    id: "T03000"
    text: "10. Що повинні робити гравці, коли у них є карта Туз, на якій написано «винайшов нову атаку X»?"
  -
    id: "T03010"
    text: "Гравець може вигадати будь-яку атаку, яку вважає дійсною, але вона повинна відповідати масті карти (наприклад, Перевірка та Кодування Даних)."
  -
    id: "T03020"
    text: "З гравцями, що вперше грають у гру, можливо краще спочатку вилучити їх (дивіться також FAQ 9)."
  -
    id: "T03060"
    text: "11. Моя компанія хоче надрукувати власну версію OWASP® Cornucopia — на яку ліцензію нам потрібно посилатися?"
  -
    id: "T03070"
    text: "Будь ласка, зверніться до повної відповіді на це питання на веб-сторінках проекту за адресою"
