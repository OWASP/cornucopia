    id: "T03800"
    text: "Учасники проекту"
  -
    id: "T03810"
    text: "Усі проекти OWASP спираються на добровільні зусилля людей у секторах розробки програмного забезпечення та інформаційної безпеки. "
  -
    id: "T03820"
    text: "Вони витратили свій час та енергію, щоб робити пропозиції, надавати відгуки, писати, рецензувати та редагувати документацію, давати підтримку, тестувати гру та просувати концепцію. "
  -
    id: "T03830"
    text: "Без усіх їхніх зусиль проект не просунувся б до цього моменту. "
  -
    id: "T03840"
    text: "Будь ласка, зверніться до списку розсилки або безпосередньо до керівників проекту, якщо когось немає в наведених нижче списках."
  -
    id: "T03850"
    text: "Працьовиті співробітники OWASP."
  -
    id: "T03860"
    text: "Відвідувачі зустрічей відділень OWASP® London, OWASP® Manchester, OWASP® Netherlands та OWASP® Scotland, а також London Gamification meetup, які зробили корисні пропозиції та ставили складні запитання"
  -
    id: "T03870"
    text: "Blackfoot UK Limited за подарунок готових до друку файлів дизайну та сотень професійно надрукованих карткових колод для розповсюдження поштою та на зустрічах відділень OWASP"
  -
    id: "T03880"
    text: 'OWASP® NYC за створення дизайну коробки OWASP та розповсюдження наборів на AppSec USA 2014.'
