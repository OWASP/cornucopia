    value: "7"
    url: "https://cornucopia.owasp.org/cards/AZ7"
    desc: "Юаньцзін може отримати доступ до функцій, об'єктів або властивостей застосунку, на які у нього немає прав"
  -
    id: "AZ8"
    value: "8"
    url: "https://cornucopia.owasp.org/cards/AZ8"
    desc: "Том може обійти бізнес-правила, змінюючи звичайний хід процесу або виконуючи процес у неправильному порядку, або маніпулюючи значеннями дати та часу, що використовуються застосунком, або використовуючи доступні функції для непередбачених цілей, або іншим чином маніпулюючи керуючими даними"
  -
    id: "AZ9"
    value: "9"
    url: "https://cornucopia.owasp.org/cards/AZ9"
    desc: "Майкл може обійти застосунок для отримання доступу до даних, оскільки адміністративні інструменти або адміністративні інтерфейси не захищені належним чином"
  -
    id: "AZX"
    value: "10"
    url: "https://cornucopia.owasp.org/cards/AZX"
    desc: "Річард може обійти централізовані засоби контролю авторизації, оскільки вони не використовуються вичерпно при всіх взаємодіях, або через неправильне налаштування, або тому що застосунок не використовує централізований стандартний, протестований, перевірений, рекомендований та затверджений модуль/фреймворк/сервіс авторизації"
  -
    id: "AZJ"
    value: "В"
    url: "https://cornucopia.owasp.org/cards/AZJ"
    desc: "Дініс може отримати доступ до інформації про конфігурацію безпеки або списків керування доступом"
  -
    id: "AZQ"
    value: "Д"
    url: "https://cornucopia.owasp.org/cards/AZQ"
    desc: "Крістофер може встромити команду, яку застосунок виконає з підвищеними привілеями"
  -
    id: "AZK"
    value: "К"
    url: "https://cornucopia.owasp.org/cards/AZK"
    desc: "Адріан може впливати на засоби контролю та дозволи авторизації або змінювати їх, і тому може обійти їх"
  -
    id: "AZA"
    value: "A"
    url: "https://cornucopia.owasp.org/cards/AZA"
    desc: "Ви винайшли нову атаку проти Авторизації"
    misc: "Дізнайтеся більше про цю тему в настановах OWASP з розробки та тестування"
-
  id: "CR"
  name: "КРИПТОГРАФІЯ"
  cards:
  -
    id: "CR2"
    value: "2"
    url: "https://cornucopia.owasp.org/cards/CR2"
    desc: "К'юн може отримати доступ до даних, оскільки вони були обфускованіі, а не зашифровані затвердженою криптографічною функцією"
  -
    id: "CR3"
    value: "3"
    url: "https://cornucopia.owasp.org/cards/CR3"
    desc: "Аксель може змінити тимчасові або постійні дані (збережені або під час передачі), або вихідний код, або оновлення/патчі, або дані конфігурації, оскільки вони не підлягають перевірці цілісності"
  -
    id: "CR4"
    value: "4"
    url: "https://cornucopia.owasp.org/cards/CR4"
    desc: "Пауло може отримати доступ до даних у транзиті, які не зашифровані, навіть якщо канал зашифрований"
  -
    id: "CR5"
    value: "5"
    url: "https://cornucopia.owasp.org/cards/CR5"
    desc: "Кайл може обійти криптографічні засоби захисту, оскільки вони не дають збій у безпечний спосіб (тобто за замовчуванням немає захисту)"
  -
    id: "CR6"
    value: "6"
    url: "https://cornucopia.owasp.org/cards/CR6"
    desc: "Ромен може читати та змінювати незашифровані дані в пам'яті або під час передачі (наприклад, криптографічні секрети, облікові дані, ідентифікатори сесій, особисті та комерційно чутливі дані), що використовуються або передаються у застосунку, або між застосунком та користувачами, або між застосунком та зовнішніми системами"
  -
    id: "CR7"
    value: "7"
    url: "https://cornucopia.owasp.org/cards/CR7"
    desc: "Ґюнтер може перехоплювати або змінювати зашифровані та/або захешовані дані під час передачі, оскільки протокол погано розгорнуто або слабко налаштовано, або сертифікати недійсні, або сертифікати не є довіреними, або з'єднання може бути деградовано до слабшого або незашифрованого"
  -
    id: "CR8"
    value: "8"
    url: "https://cornucopia.owasp.org/cards/CR8"
    desc: "Еойн може отримати доступ до збережених бізнес-даних (наприклад, паролів, ідентифікаторів сесій, персональних даних, даних платіжних карток), оскільки вони ненадійно зашифровані або захешовані"
  -
    id: "CR9"
    value: "9"
    url: "https://cornucopia.owasp.org/cards/CR9"
    desc: "Енді може обійти криптографічні засоби захисту, оскільки функції генерації випадкових чисел, GUID або хешування реалізовані самостійно, є ризикованими або слабкими"
  -
    id: "CRX"
    value: "10"
    url: "https://cornucopia.owasp.org/cards/CRX"
    desc: "Сюзанна може зламати криптографію, що використовується, оскільки вона недостатньо надійна для необхідного ступеня захисту, або недостатньо надійна для обсягу зусиль, які зловмисник готовий докласти"
  -
    id: "CRJ"
    value: "В"
    url: "https://cornucopia.owasp.org/cards/CRJ"
    desc: "Джастін може прочитати облікові дані для доступу до внутрішніх або зовнішніх ресурсів, сервісів та інших систем, оскільки вони зберігаються у незашифрованому форматі або збережені у вихідному коді"
  -
    id: "CRQ"
    value: "Д"
    url: "https://cornucopia.owasp.org/cards/CRQ"
    desc: "Артім може отримати доступ або передбачити головні криптографічні секрети"
  -
    id: "CRK"
    value: "К"
    url: "https://cornucopia.owasp.org/cards/CRK"
    desc: "Ден може впливати або змінювати код/компоненти криптографії (шифрування, хешування, цифрові підписи, генерація випадкових чисел та GUID) і тому може обійти їх"
  -
    id: "CRA"
    value: "A"
    url: "https://cornucopia.owasp.org/cards/CRA"
    desc: "Ви винайшли нову атаку проти Криптографії"
    misc: "Дізнайтеся більше про цю тему в безкоштовних шпаргалках OWASP з криптографічного зберігання та захисту транспортного рівня"
-
  id: "C"
  name: "CORNUCOPIA"
  cards:
  -
    id: "C2"
    value: "2"
    url: "https://cornucopia.owasp.org/cards/C2"
    desc: "Лі може обійти засоби контролю застосунку, оскільки замість безпечніших функцій використовуються небезпечні/ризиковані аналоги, або існують помилки перетворення типів, або тому що застосунок ненадійний при недоступності зовнішнього ресурсу, або виникають стани гонки, або є проблеми з ініціалізацією, витоком або розподілом ресурсів, або може виникнути переповнення"
  -
    id: "C3"
    value: "3"
    url: "https://cornucopia.owasp.org/cards/C3"
    desc: "Ендрю може отримати доступ до вихідного коду, або декомпілювати, або налагодити, або іншим чином отримати доступ до бізнес-логіки, щоб зрозуміти, як працює застосунок та які секрети він містить"
  -
    id: "C4"
    value: "4"
    url: "https://cornucopia.owasp.org/cards/C4"
    desc: "Кіт може виконати дію, яку неможливо йому приписати"
  -
    id: "C5"
    value: "5"
    url: "https://cornucopia.owasp.org/cards/C5"
    desc: "Ларрі може вплинути на довіру інших сторін, включаючи користувачів, до застосунку, або зловживати цією довірою деінде (наприклад, в іншому застосунку)"
  -
    id: "C6"
    value: "6"
    url: "https://cornucopia.owasp.org/cards/C6"
    desc: "Аарон може обійти засоби контролю, оскільки обробка помилок/виключень відсутня або реалізується непослідовно чи частково, або не закриває доступ за замовчуванням (тобто помилки мають припиняти доступ/виконання), або покладається на обробку якоюсь іншою службою або системою"
  -
    id: "C7"
    value: "7"
    url: "https://cornucopia.owasp.org/cards/C7"
    desc: "Дії Мвенгу не можуть бути досліджені, оскільки події безпеки не записуються з достатньою точністю часової мітки, або не записується повний журнал аудиту, або Мвенгу може змінити чи видалити їх, або відсутня централізована служба журналювання"
  -
    id: "C8"
    value: "8"
    url: "https://cornucopia.owasp.org/cards/C8"
    desc: "Девід може обійти застосунок для отримання доступу до даних, оскільки мережева та хостова інфраструктура та підтримуючі сервіси/застосунки не були безпечно налаштовані, конфігурація не перевіряється періодично та патчі безпеки не застосовуються, або дані зберігаються локально, або дані не захищені фізично"
  -
    id: "C9"
    value: "9"
    url: "https://cornucopia.owasp.org/cards/C9"
    desc: "Майк може зловживати застосунком, використовуючи допустиму функцію надто швидко, або надто часто, або іншим чином, що не передбачається, або споживаючи ресурси застосунку, або спричиняючи стани гонки, або надмірно використовуючи функціонал"
  -
    id: "CX"
    value: "10"
    url: "https://cornucopia.owasp.org/cards/CX"
    desc: "Спірос може обійти засоби контролю застосунку, оскільки фреймворки, бібліотеки та компоненти (власні, куплені, аутсорсингові, відкриті, зовнішні) містять шкідливий код або вразливості"
  -
    id: "CJ"
    value: "В"
    url: "https://cornucopia.owasp.org/cards/CJ"
    desc: "Роман може експлуатувати застосунок, оскільки він був небезпечно скомпільований або розгорнутий, або його конфігурація не є безпечною за замовчуванням, або тому що інформація про безпеку не була задокументована або передана обслуговуючим командам, або користувач не отримує попереджень і доступ не блокується, коли очікувані функції безпеки не підтримуються або вимкнені"
  -
    id: "CQ"
    value: "Д"
    url: "https://cornucopia.owasp.org/cards/CQ"
    desc: "Джим може вчиняти шкідливі, аномальні дії без виявлення та реагування з боку застосунку в режимі реального часу"
  -
    id: "CK"
    value: "К"
    url: "https://cornucopia.owasp.org/cards/CK"
    desc: "Ґрант може використовувати застосунок, щоб відмовити в обслуговуванні деяким або всім його користувачам"
  -
    id: "CA"
    value: "A"
    url: "https://cornucopia.owasp.org/cards/CA"
    desc: "Ви винайшли нову атаку будь-якого типу"
    misc: "Дізнайтеся більше про безпеку застосунків у безкоштовних настановах OWASP з вимог, розробки, рецензування коду та тестування, серії шпаргалок та Open Software Assurance Maturity Model"
-
  id: "WC"
  name: "ДЖОКЕР"
  cards:
  -
    id: "JOA"
    value: "A"
    url: "https://cornucopia.owasp.org/cards/JOA"
    card: "Joker"
    desc: "Аліса може використовувати застосунок для атаки на системи та дані користувачів"
    misc: "Чи думали ви про те, щоб стати індивідуальним членом OWASP? Усі інструменти, настанови та місцеві зустрічі безкоштовні для всіх, але індивідуальне членство допомагає підтримати роботу OWASP"
  -
    id: "JOB"
    value: "B"
    url: "https://cornucopia.owasp.org/cards/JOB"
    card: "Joker"
    desc: "Боб може вплинути на застосунок, змінити або зачепити його так, що він більше не відповідатиме юридичним, регуляторним, договірним або іншим організаційним вимогам"
    misc: "Вивчайте вразливості та дізнайтеся, як їх можна виправити, використовуючи безкоштовний OWASP® Juice Shop, Security Shepherd або онлайн-завдання безкоштовного OWASP® Hacking-lab"
paragraphs:
-
  id: "Common"
  name: "Common"
  sentences:
  -
    id: "NoCard"
    text: "Немає Карти"
  -
    id: "Title"
    text: "Website App Edition v3.0-UK"
  -
    id: "Title_full"
    text: "OWASP® Cornucopia Website App Edition v3.0-UK"
  -
    id: "T00005"
    text: "Зміст"
  -
    id: "T00005"
    text: "Зміст"
  -
    id: "T00010"
    text: "OWASP® Cornucopia — це механізм, що допомагає командам розробки програмного забезпечення визначати вимоги безпеки в Agile, звичайних та формальних процесах розробки."
  -
    id: "T00020"
    text: "Автор"
  -
    id: "T00030"
    text: "Керівники проекту"
  -
    id: "T00100"
    text: "Подяки"
  -
    id: "T00110"
    text: "Адаму Шостаку та команді Microsoft SDL за «Elevation of Privilege Threat Modelling Game», опубліковану під ліцензією Creative Commons Attribution, як натхнення для Cornucopia, з якої було скопійовано багато ідей, особливо ігрову механіку."
  -
    id: "T00120"
    text: "Кіту Терпіну та учасникам OWASP® «Secure Coding Practices - Quick Reference Guide», спочатку пожертвуваного OWASP компанією Boeing, який використовується як основне джерело інформації про вимоги безпеки для формулювання змісту карт."
  -
    id: "T00130"
    text: "Учасникам, прихильникам, спонсорам та волонтерам проектів OWASP® ASVS, AppSensor, Developer Guide та Web Framework Security Matrix, Mitre Common Attack Pattern Enumeration and Classification (CAPEC™) та SAFECode «Practical Security Stories and Security Tasks for Agile Development Environments», які використовуються в перехресних посиланнях."
  -
    id: "T00140"
    text: "Playgen за надання змістовного семінару з гейміфікації завдань, та tartanmaker.com за онлайн-інструмент для створення малюнка на звороті карт."
  -
    id: "T00145"
    text: "Поточним та колишнім учасникам і лідерам проекту OWASP® Cornucopia, особливо тим, хто нещодавно оновлював перехресні посилання, створював онлайн-версії та писав скрипти для динамічного генерування вихідних файлів Cornucopia."
  -
    id: "T00150"
    text: "Blackfoot (UK) Limited за створення та пожертву готових до друку файлів дизайну, Тому Бреннану та OWASP® Foundation за ініціювання створення коробки та листівки під брендом OWASP, а також Secure Delivery Ltd за розробку та пожертву Copi, платформи для гри в Cornucopia та EoP онлайн."
  -
    id: "T00161"
    text: "(продовження на стор. 20)"
  -
    id: "T00162"
    text: "(продовження зі стор. 10)"
  -
    id: "T00170"
    text: "Колін Вотсон як автор і співкерівник проекту разом із Ґрантом Онгерсом та іншими волонтерами OWASP, які допомогли в багатьох відношеннях."
  -
    id: "T00180"
    text: "OWASP® не підтримує та не рекомендує комерційні продукти або послуги © 2012-2025 OWASP® Foundation Цей документ ліцензовано відповідно до ліцензії Creative Commons Attribution-ShareAlike 3.0"
  -
    id: "T00200"
    text: "Вступ"
  -
    id: "T00210"
    text: "Ідея Cornucopia полягає в тому, щоб допомогти командам розробників, особливо тим, хто використовує методології Agile, визначати вимоги безпеки застосунків та розробляти засновані на безпеці користувацькі історії."
  -
    id: "T00220"
    text: "Хоча ідея достатньо довго чекала на реалізацію, остаточна мотивація з'явилася, коли SAFECode опублікувала Practical Security Stories and Security Tasks for Agile Development Environments у липні 2012 року."
  -
    id: "T00230"
    text: "Команда Microsoft SDL вже опублікувала чудову гру Elevation of Privilege: The Threat Modeling Game (EoP), але вона, здавалося, не охоплює найактуальніших проблем, з якими переважно стикаються команди розробки веб-застосунків."
  -
    id: "T00240"
    text: "EoP — чудова концепція та ігрова стратегія, опублікована під ліцензією Creative Commons Attribution License."
  -
    id: "T00250"
    text: "Cornucopia Website App Edition заснована на концепціях та ігрових ідеях EoP, але вони були змінені, щоб бути більш релевантними для типів проблем, з якими стикаються розробники веб-застосунків."
  -
    id: "T00260"
    text: "Вона намагається впровадити ідеї моделювання загроз у команди розробників, що використовують методологію Agile, або більше зосереджені на слабких місцях веб-застосунків, ніж на інших типах вразливостей програмного забезпечення, або не знайомі зі STRIDE та DREAD."
  -
    id: "T00270"
    text: "Cornucopia Website App Edition згадується як інформаційний ресурс у Додатку до Стандарту безпеки PCI PCI DSS E-commerce Guidelines, v2, січень 2013 року."
  -
    id: "T00300"
    text: "Колода карт (набір)"
  -
    id: "T00310"
    text: "На відміну від мастей STRIDE в EoP (набори карт зі схожим дизайном), масті в Cornucopia засновані на структурі OWASP® Secure Coding Practices - Quick Reference Guide (SCP), але з додатковим урахуванням розділів з OWASP® Application Security Verification Standard, Web Security Testing Guide (WSTG) та Principles of Secure Development Девіда Рука. "
  -
    id: "T00320"
    text: "Це дало п'ять мастей, а шоста під назвою «Cornucopia» була створена для всього іншого: "
  -
    id: "T00330"
    text: "Перевірка та Кодування Даних (ПД)"
  -
    id: "T00340"
    text: "Автентифікація (АТ)"
  -
    id: "T00350"
    text: "Керування Сесіями (КС)"
  -
    id: "T00360"
    text: "Авторизація (АЗ)"
  -
    id: "T00370"
    text: "Криптографія (КР)"
  -
    id: "T00380"
    text: "Корнукопія (C)"
  -
    id: "T00390"
    text: "Подібно до покерних карт, кожна масть містить 13 карт (Туз, 2-10, Валет, Дама та Король), але, на відміну від EoP, є також дві карти Джокер."
  -
    id: "T00400"
    text: "Зміст в основному взятий з SCP."
  -
    id: "T00500"
    text: "Відповідності"
  -
    id: "T00510"
    text: "Інша мета Cornucopia — пов'язати атаки з вимогами та техніками перевірки."
  -
    id: "T00520"
    text: "Початковою метою було посилання на ідентифікатори слабкостей CWE, але їх виявилося надто багато, і натомість було вирішено зіставити кожну карту з ідентифікаторами шаблонів атак CAPEC, які самі по собі зіставляються з CWE, що дозволяє досягти бажаного результату."
  -
    id: "T00530"
    text: "Кожна картка також зіставлена з 36 основними історіями безпеки в документі SAFECode, а також з переліком вимог OWASP® Developer Guide Web Application Checklist v4.1.9, ASVS v5.0 та AppSensor (виявлення атак на застосунки та реагування на них), щоб допомогти командам створювати власні пов'язані з безпекою історії для використання в гнучких процесах."
  -
    id: "T00600"
    text: "Ігрова стратегія"
  -
    id: "T00610"
    text: "Крім відмінностей у змісті, правила гри практично ідентичні правилам EoP."
  -
    id: "T00700"
    text: "Друк карт"
  -
    id: "T00710"
    text: "Перевірте сторінку проекту Cornucopia, щоб дізнатися, як отримати попередньо надруковані колоди на глянцевому картоні."
  -
    id: "T00720"
    text: "Карти можна роздрукувати з цього документа в чорно-білому, але краще в кольоровому варіанті."
  -
    id: "T00730"
    text: "Карти на наступних сторінках цього документа розміщені так, щоб вміщатися на одному типі попередньо насіченого аркуша A4 для візитних карток. "
  -
    id: "T00740"
    text: "Це, мабуть, найшвидший спосіб виготовлення ігрових карт. "
  -
    id: "T00750"
    text: "Успішно протестовано продукти Avery з кодами C32015 та C32030, але будь-які 10 карток 85 мм × 54 мм на аркуші A4 повинні підійти з невеликим коригуванням."
  -
    id: "T00760"
    text: "Інші постачальники канцелярії, такі як Ryman та Sigel, виробляють подібні аркуші"
  -
    id: "T00770"
    text: "Такі аркуші для карток недешеві, тому слід ретельно підходити до вибору того, що друкувати, на якому носії та яким принтером."
  -
    id: "T00780"
    text: "Звичайно, карти можна просто роздрукувати на будь-якому розмірі паперу або картону і потім вирізати вручну, або комерційний друкар може надрукувати більший обсяг та нарізати карти по розміру. "
  -
    id: "T00790"
    text: "Лінії розрізу показані на передостанній сторінці цього документа, але Avery також виробляє горизонтальний шаблон A4 (A-0017-01_L.doc), який можна використовувати як орієнтир."
  -
    id: "T00800"
    text: "Друк та нарізання можуть зайняти близько години, а використання швидшого принтера допоможе."
  -
    id: "T00810"
    text: "Намагайтеся друкувати у більш високій якості для кращої читабельності."
  -
    id: "T00820"
    text: "Необов'язковий дизайн звороту карт (у тартані OWASP®) наведено на останній сторінці цього документа."
  -
    id: "T00830"
    text: "Особливого вирівнювання не потрібно. "
  -
    id: "T00840"
    text: "Двосторонній друк потребує особливої обережності. "
  -
    id: "T00850"
    text: "Ви можете налаштувати лицьову сторону карт або їх звороти відповідно до уподобань вашої організації."
  -
    id: "T00900"
    text: "Налаштування"
  -
    id: "T00910"
    text: "Після кількох ігор у Cornucopia ви можете відчути, що деякі карти менш релевантні для ваших застосунків, або загрози різні для вашої організації."
  -
    id: "T00920"
    text: "Відредагуйте цей документ самостійно, щоб зробити карти більш відповідними для ваших команд, або створіть нові колоди повністю."
  -
    id: "T01000"
    text: "Залиште відгук"
  -
    id: "T01010"
    text: "Якщо у вас є ідеї або відгуки щодо використання OWASP® Cornucopia, будь ласка, поділіться ними."
  -
    id: "T01020"
    text: "Ще краще, якщо ви створите альтернативні версії карт або виготовите професійні готові до друку версії, будь ласка, поділіться ними з волонтерами, які створили це видання, та з ширшою спільнотою розробки застосунків та безпеки застосунків."
  -
    id: "T01030"
    text: "Найкраще місце для обговорення або участі — це список/група проекту OWASP:"
  -
    id: "T01040"
    text: "Список/Група"
  -
    id: "T01050"
    text: "Домашня сторінка проекту"
  -
    id: "T01060"
    text: "Усі документи та інструменти OWASP безкоштовні для завантаження та використання."
  -
    id: "T01070"
    text: "OWASP® Cornucopia ліцензовано за ліцензією Creative Commons Attribution-ShareAlike 3.0."
  -
    id: "T01100"
    text: "Інструкції"
  -
    id: "T01110"
    text: "Текст на кожній карті описує атаку, але зловмиснику дається ім'я, унікальне для всіх карт."
  -
    id: "T01120"
    text: "Ім'я може представляти комп'ютерну систему (наприклад, базу даних, файлову систему, інший застосунок, пов'язаний сервіс, ботнет), окрему особу (наприклад, громадянина, клієнта, замовника, співробітника, злочинця, шпигуна) або навіть групу людей (наприклад, конкуруючу організацію, активістів зі спільною метою)."
  -
    id: "T01130"
    text: "Зловмисник може бути віддаленим на іншому пристрої/місці, або локальним/внутрішнім з доступом до того самого пристрою, хосту або мережі, на якій працює застосунок."
  -
    id: "T01140"
    text: "Зловмисник завжди названий на початку кожного опису"
  -
    id: "T01150"
    text: "Наприклад:"
  -
    id: "T01160"
    text: "Вільям контролює генерацію ідентифікаторів сесій."
  -
    id: "T01170"
    text: "Це означає, що зловмисник (Вільям) може створювати нові ідентифікатори сесій, які застосунок приймає."
  -
    id: "T01180"
    text: "Атаки були в першу чергу взяті з вимог безпеки, перелічених у SCP v2, але потім доповнені цілями перевірки з «Стандарту перевірки безпеки застосунків» OWASP®, зосередженими на безпеці історіями з «Практичних историй безпеки та завдань безпеки для середовищ гнучкої розробки» SAFECode, і, нарешті, оглядом карт в EoP. У OWASP Cornucopia Website Edition v3.0 зіставлення SCP було замінено переліком вимог з Настанови розробника OWASP"
  -
    id: "T01190"
    text: "Детальніша інформація про кожну карту доступна на веб-сайті OWASP за адресою "
  -
    id: "T01200"
    text: "Посилання між атаками та п'ятьма ресурсами наведені на більшості карт:"
  -
    id: "T01210"
    text: "Вимоги «OWASP DevGuide - Web Checklist», v4.1.9, OWASP®, липень 2025 "
  -
    id: "T01220"
    text: "Ідентифікатори перевірки в OWASP® «Application Security Verification Standard»"
  -
    id: "T01230"
    text: "Ідентифікатори точок виявлення атак в «AppSensor», OWASP®, серпень 2010-2015"
  -
    id: "T01240"
    text: "Ідентифікатори в «Common Attack Pattern Enumeration and Classification (CAPEC™)», v3.9, Mitre Corporation, листопад 2015"
  -
    id: "T01250"
    text: "Зосереджені на безпеці історії з 'Practical Security Stories and Security Tasks for Agile Development Environments', SAFECode, липень 2012"
  -
    id: "T01260"
    text: "Посилання означає, що атака включена в зазначений матеріал, але не обов'язково охоплює весь його зміст. "
  -
    id: "T01270"
    text: "Для структурованих даних, таких як CAPEC, наводиться найбільш конкретне посилання, але іноді надається перехресне посилання, яке також має більш конкретні (дочірні) приклади."
  -
    id: "T01280"
    text: "На шести Тузах та двох Джокерах посилань немає. "
  -
    id: "T01290"
    text: "Натомість на цих картах є загальні поради, написані курсивом."
  -
    id: "T01300"
    text: "У Cornucopia можна грати багатьма різними способами. "
  -
    id: "T01301"
    text: "Як грати, читайте на сторінках: 11-19."
  -
    id: "T01310"
    text: "Ось один із способів, продемонстрований онлайн у відео за адресою "
  -
    id: "T01311"
    text: " в якому використовується новий (травень 2015) бланк рахунку за адресою "
  -
    id: "T01400"
    text: "Підготовка"
  -
    id: "T01410"
    text: "Отримайте колоду або роздрукуйте та розріжте власну колоду карт Cornucopia (дивіться сторінку 2 цього документа)"
  -
    id: "T01411"
    text: "Використовуйте карти з цього набору"
  -
    id: "T01420"
    text: "Визначте застосунок або процес застосунку для огляду; це може бути концепція, проект або реальна реалізація"
  -
    id: "T01430"
    text: "Створіть діаграму потоків даних, користувацькі історії або інші артефакти для допомоги в огляді"
  -
    id: "T01431"
    text: "Це допоможе відповісти на питання: «Над чим ми працюємо?»"
  -
    id: "T01440"
    text: "Визначте та запросіть групу з 3-6 архітекторів, розробників, тестувальників та інших зацікавлених сторін бізнесу та сядьте за стіл (намагайтеся включити когось, хто досить добре знайомий з безпекою застосунків)"
  -
    id: "T01450"
    text: "Підготуйте якісь призи (золоті зірки, шоколад, піцу, пиво або квіти залежно від культури вашого офісу)"
  -
    id: "T01500"
    text: "Гра"
  -
    id: "T01510"
    text: "Одна масть — Cornucopia — є козирем."
  -
    id: "T01520"
    text: "Тузи старші (тобто перевершують Королів)."
  -
    id: "T01530"
    text: "Корисно, якщо є незалежний спостерігач для документування проблем та рахунку."
  -
    id: "T01540"
    text: "Приберіть Джокерів та кілька карт з низьким рахунком (2, 3, 4) з масті Cornucopia, щоб кожен гравець мав однакову кількість карт"
  -
    id: "T01550"
    text: "Перемішайте колоду та роздайте всі карти"
  -
    id: "T01560"
    text: "Для початку оберіть гравця випадковим чином, який зіграє першу карту — він може зіграти будь-яку карту зі своєї руки, крім козирної масті — Cornucopia"
  -
    id: "T01570"
    text: "Щоб зіграти карту, кожен гравець повинен прочитати її вголос та пояснити (дивіться онлайн Wiki Deck для підказок), як загроза може застосовуватися (гравець отримує бал за атаки, які, на думку групи, можуть спрацювати та є дієвою помилкою) — не намагайтеся думати про пом'якшення на цьому етапі, і не виключайте загрозу лише через переконання, що вона вже пом'якшена — хтось нотує карту та фіксує порушені проблеми"
  -
    id: "T01571"
    text: "Якщо гравець застряг, попросіть його відсканувати QR-код на карті, щоб отримати доступ до онлайн-сторінки карти та прочитати розділ під назвою: «Що може піти не так?»"
  -
    id: "T01580"
    text: "Грайте за годинниковою стрілкою, кожна особа повинна зіграти карту таким самим чином; якщо у вас є будь-яка карта відповідної провідної масті, ви повинні зіграти одну з них, інакше можна зіграти карту будь-якої іншої масті. "
  -
    id: "T01590"
    text: "Тільки вища карта тієї самої масті або найвища карта козирної масті Cornucopia виграє руку."
  -
    id: "T01600"
    text: "Той, хто виграє раунд, починає наступний (тобто грає першим), і таким чином визначає наступну провідну масть"
  -
    id: "T01610"
    text: "Повторюйте, поки не закінчаться всі карти"
  -
    id: "T01700"
    text: "Підрахунок очок"
  -
    id: "T01710"
    text: "Мета — визначити застосовні загрози та виграти руки (раунди):"
  -
    id: "T01720"
    text: "Додайте +1 за кожну карту, яку можна визначити як реальну загрозу для розглянутого застосунку"
  -
    id: "T01730"
    text: "Додайте +1 за виграний раунд"
  -
    id: "T01740"
    text: "Після того, як всі карти зіграні, перемагає той, хто набрав найбільше очок"
  -
    id: "T01800"
    text: "Завершення гри"
  -
    id: "T01810"
    text: "Перегляньте всі застосовні загрози та відповідні вимоги безпеки"
  -
    id: "T01811"
    text: "Використовуйте QR-коди на картах, щоб отримати доступ до онлайн-сторінки карти та прочитати розділ під назвою: «Що ми збираємося з цим зробити?»"
  -
    id: "T01820"
    text: "Створіть користувацькі історії, специфікації та тестові кейси відповідно до вашої методології розробки."
  -
    id: "T01900"
    text: "Альтернативні правила гри"
  -
    id: "T01910"
    text: "Якщо ви нові в грі, спочатку приберіть Тузів та дві карти Джокер."
  -
    id: "T01920"
    text: "Поверніть карти Джокер, коли люди краще ознайомляться з процесом."
  -
    id: "T01930"
    text: "Крім правил «гри з козирями», описаних вище, які дуже схожі на EoP, у колоду також можна грати за правилами «гри двадцять одне» (також відомої як «понтун» або «блекджек»), які зазвичай зменшують кількість карт, зіграних у кожному раунді."
  -
    id: "T01940"
    text: "Практикуйтеся на уявному застосунку або навіть на майбутньому запланованому застосунку, а не намагайтеся знайти вади в існуючих застосунках, поки учасники не будуть задоволені корисністю гри."
  -
    id: "T01950"
    text: "Розгляньте гру лише однією мастю, щоб зробити сесію коротшою — але намагайтеся охопити всі масті для кожного проекту. "
  -
    id: "T01960"
    text: "Або ще краще просто зіграйте одну руку з попередньо відібраними картами та рахуйте лише здатність визначати вимоги безпеки. "
  -
    id: "T01970"
    text: "Можливо, зіграйте по одній грі кожної масті щодня протягом тижня або близько того, якщо учасники не можуть виділити достатньо часу для повної колоди."
  -
    id: "T01980"
    text: "Деякі команди воліють зіграти повну руку карт, а потім обговорити те, що на картах, після кожного раунду (замість після того, як кожна особа зіграє карту)."
  -
    id: "T01990"
    text: "Ще одна пропозиція: якщо гравець не може визначити карту як релевантну, дозвольте іншим гравцям пропонувати ідеї та потенційно дозвольте їм отримати бал за цю карту. "
  -
    id: "T02000"
    text: "Розгляньте можливість нарахування додаткових балів за особливо хороший внесок."
  -
    id: "T02010"
    text: "Ви навіть можете грати самостійно. "
  -
    id: "T02020"
    text: "Просто використовуйте карти як генератори ідей. "
  -
    id: "T02030"
    text: "Хоча залучення більшої кількості людей буде більш корисним."
  -
    id: "T02040"
    text: "У настановах Microsoft EoP вони рекомендують шахрайство як хорошу ігрову стратегію."
  -
    id: "T02100"
    text: "Модифіковані колоди карт для конкретних фреймворків розробки"
  -
    id: "T02110"
    text: "У деяких широко використовуваних мовах та фреймворках для розробки веб та мобільних застосунків можуть бути вбудовані засоби безпеки."
  -
    id: "T02120"
    text: "За певних умов корисно розглянути, як використання цих засобів може спростити визначення додаткових вимог — за умови, звичайно, що засоби включені, увімкнені та правильно налаштовані."
  -
    id: "T02130"
    text: "Розгляньте можливість вилучення карт з колоди, якщо ви впевнені, що вони охоплені способом використання мови/фреймворку."
  -
    id: "T02140"
    text: "Елементи в дужках є «можливими»."
  -
    id: "T02200"
