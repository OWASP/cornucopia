    text: "Стандарт ASVS оновлено з версії 4.0.3 до версії 5.0. Текст на картах оновлено, щоб включити MFA та ключі доступу як варіант автентифікації. Картки в наборі керування сесіями оновлено для відповідності сучасним практикам керування сесіями."
  -
    id: "T03774"
    text: "3.0"
  -
    id: "T03775"
    text: "До кожної картки додано категорії STRIDE"
