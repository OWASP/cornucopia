openapi: 3.0.3

info:
  title: OWASP Cornucopia API
  description: |
    Public API for accessing OWASP Cornucopia card data and metadata.
    This API exposes language metadata and Open CRE mappings
    for both Website App and Mobile App editions.
  version: 1.0.0

servers:
  - url: /api

paths:

  /lang/webapp/{version}:
    get:
      summary: Get supported languages for Webapp edition
      description: |
        Returns metadata about supported languages for the
        OWASP Cornucopia Website App Edition.
      parameters:
        - name: version
          in: path
          required: true
          schema:
            type: string
            enum: ["2.2", "3.0"]
      responses:
        '200':
          description: Language metadata for Website App edition
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LanguageMetaWeb'
              examples:
                example:
                  summary: Example language metadata response
                  value:
                    meta:
                      edition: OWASP Cornucopia Website App Edition
                      component: cards
                      language: all
                      languages: [en, es, fr, nl, no_nb, pt_br, pt_pt, it, ru]
                      version: "2.2"

  /lang/mobileapp/{version}:
    get:
      summary: Get supported languages for Mobile edition
      description: |
        Returns metadata about supported languages for the
        OWASP Cornucopia Mobile App Edition.
      parameters:
        - name: version
          in: path
          required: true
          schema:
            type: string
            enum: ["1.1"]
      responses:
        '200':
          description: Language metadata for Mobile App edition
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LanguageMetaMobile'
              examples:
                example:
                  summary: Example language metadata response
                  value:
                    meta:
                      edition: OWASP Cornucopia Mobile App Edition
                      component: cards
                      language: all
                      languages: [en]
                      version: "1.1"


  /lang/dbd/{version}:
    get:
      summary: Get supported languages for Cornucopia Digital Benefits and Disbenefits edition
      description: |
        Returns metadata about supported languages for the
        Cornucopia Digital Benefits and Disbenefits Edition.
      parameters:
        - name: version
          in: path
          required: true
          schema:
            type: string
            enum: ["1.0"]
      responses:
        '200':
          description: Language metadata for Digital Benefits and Disbenefits edition
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LanguageMetaDbd'
              examples:
                example:
                  summary: Example language metadata response
                  value:
                    meta:
                      component: cards
                      language: all
                      languages: [en]
                      version: "1.0"

  /cre/dbd/{lang}:
    get:
      summary: Get DBD cards by language
      description: |
        Get the Cornucopia Digital Benefits and Disbenefits Edition cards.
        This edition does not have Open CRE mappings.
      parameters:
        - name: lang
          in: path
          required: true
          schema:
            type: string
            enum: [en]
      responses:
        '200':
          description: Digital Benefits and Disbenefits cards
          content:
            application/json:
              schema:
                type: object
              examples:
                example:
                  summary: Example DBD response
                  value:
                    meta:
                      edition: Cornucopia Digital Benefits and Disbenefits Edition
                      component: cards
                      language: en
                      version: "1.0"
                    data:
                      - id: SCO2
                        desc: Tommy does not create, publish and maintain publicly all the service assumptions...

  /cre/webapp/{lang}:
    get:
      summary: Get Webapp cards by language
      description: |
        Get the OWASP Cornucopia Website App Edition cards and
        their corresponding Open CRE codes by language.
        See Open CRE: https://www.opencre.org/
      parameters:
        - name: lang
          in: path
          required: true
          schema:
            type: string
            enum: [en, es, fr, nl, no_nb, pt_br, pt_pt, it, ru]
      responses:
        '200':
          description: Website App cards and Open CRE mappings
          content:
            application/json:
              schema:
                type: object
              examples:
                example:
                  summary: Example Website App response
                  value:
                    meta:
                      edition: OWASP Cornucopia Website App Edition
                      component: cards
                      language: en
                      version: "2.2"
                    data:
                      - id: AAA
                        title: Authentication Architecture
                        cre:
                          - CRE-1
                          - CRE-2
  
  /asvs/webapp/{version}:
    get:
      summary: Get Webapp ASVS data by version
      description: |
        Get the OWASP Cornucopia Website App Edition ASVS data
        by version.
      parameters:
        - name: version
          in: path
          required: true
          schema:
            type: string
            enum: ["3.0"]
      responses:
        '200':
          description: Website App ASVS data
          content:
            application/json:
              schema:
                type: object
              examples:
                example:
                  summary: Example Website App ASVS response
                  value:
                    meta:
                      edition: webapp
                      component: asvs
                      language: ALL
                      version: "3.0"
                    1.1.1:
                      capec_codes: []
                      description: Architecture analysis performed for the application
                      level: 1

  /capec/webapp/{version}:
    get:
      summary: Get Webapp CAPEC data by version
      description: |
        Get the OWASP Cornucopia Website App Edition CAPEC data
        by version.
      parameters:
        - name: version
          in: path
          required: true
          schema:
            type: string
            enum: ["3.0"]
      responses:
        '200':
          description: Website App CAPEC data
          content:
            application/json:
              schema:
                type: object
              examples:
                example:
                  summary: Example Website App CAPEC response
                  value:
                    meta:
                      edition: webapp
                      component: capec
                      language: ALL
                      version: "3.0"
                    1:
                      name: Accessing Functionality Not Properly Constrained by ACLs
                      owasp_asvs:
                        - 4.1.4

  /mapping/webapp/{version}:
    get:
      summary: Get WebApp mapping by version
      description: |
        Get the OWASP Cornucopia WebApp Edition mapping data
        by version.
      parameters:
        - name: version
          in: path
          required: true
          schema:
            type: string
            enum: ["2.2", "3.0"]
      responses:
        '200':
          description: WebApp mapping data
          content:
            application/json:
              schema:
                type: object
              examples:
                example:
                  summary: Example WebApp mapping response
                  value:
                    meta:
                      edition: webapp
                      component: mappings
                      language: ALL
                      version: "3.0"
                    cards:
                      VE2:
                          id: "VE2"
                          value: "2"
                          url: "https://cornucopia.owasp.org/cards/VE2"
                          stride: [ I ]
                          stride_print: [ 'Information Disclosure' ]
                          owasp_dev_guide: [ SC1, SC2, SC3, SC4, SC8, SC9, SC10, SC11, SC12, SC13, FM1, FM2, FM5, EE6, EE7, EE8 ]
                          owasp_dev_guide_print: [ SC1-4, SC8-13, FM1-2, FM5, EE6-8 ]
                          owasp_asvs: [ 2.4.1, 4.3.2, 13.2.2, 13.4.1, 13.4.2, 13.4.3, 13.4.4, 13.4.5, 13.4.6, 13.4.7, 15.2.3, 16.2.5, 16.3.4, 16.4.2, 16.5.1, 17.1.1 ]
                          owasp_asvs_print: [ 2.4.1, 4.3.2, 13.2.2, 13.4.1-7, 15.2.3, 16.2.5, 16.3.4, 16.4.2, 16.5.1, 17.1.1 ]
                          capec: [ 54, 113, 116, 143, 144, 149, 150, 155, 169, 215, 224, 497, 541, 546 ]
                          capec_map: {}

  /mapping/mobileapp/{version}:
    get:
      summary: Get Mobile App mapping by version
      description: |
        Get the OWASP Cornucopia Mobile App Edition mapping data
        by version.
      parameters:
        - name: version
          in: path
          required: true
          schema:
            type: string
            enum: ["1.1"]
      responses:
        '200':
          description: Mobile App mapping data
          content:
            application/json:
              schema:
                type: object
              examples:
                example:
                  summary: Example Mobile App mapping response
                  value:
                    meta:
                      edition: mobileapp
                      component: mappings
                      language: ALL
                      version: "1.1"
                    cards:
                      PC3:
                        id: "PC3"
                        value: "3"
                        url: "https://cornucopia.owasp.org/cards/PC3"
                        owasp_masvs: [ PLATFORM-3 ]
                        owasp_mastg: [ TEST-0008, TEST-0037, TEST-0057 ]
                        capec: [ 508 ]
                        safecode: [ "-" ]

  /cre/mobileapp/{lang}:
    get:
      summary: Get Mobile cards by language
      description: |
        Get the OWASP Cornucopia Mobile App Edition cards and
        their corresponding Open CRE codes by language.
        See Open CRE: https://www.opencre.org/
      parameters:
        - name: lang
          in: path
          required: true
          schema:
            type: string
            enum: [en]
      responses:
        '200':
          description: Mobile App cards and Open CRE mappings
          content:
            application/json:
              schema:
                type: object
              examples:
                example:
                  summary: Example Mobile App response
                  value:
                    meta:
                      edition: OWASP Cornucopia Mobile App Edition
                      component: cards
                      language: en
                      version: "1.1"
                    data:
                      - id: M01
                        title: Secure Storage
                        cre:
                          - CRE-5

  /cre/companion:
    get:
      summary: Get supported languages for Companion edition
      description: |
        Returns metadata about supported languages for the
        OWASP Cornucopia Companion Edition (Companion suits).
      responses:
        '200':
          description: Language metadata for Companion edition
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LanguageMetaCompanion'
              examples:
                example:
                  summary: Example language metadata response
                  value:
                    meta:
                      edition: OWASP Cornucopia Companion Edition
                      component: cards
                      language: all
                      languages: [en]
                      version: "1.0"

  /cre/companion/{lang}:
    get:
      summary: Get Companion cards by language
      description: |
        Get the OWASP Cornucopia Companion Edition cards and
        their corresponding Open CRE codes by language.
        See Open CRE: https://www.opencre.org/
      parameters:
        - name: lang
          in: path
          required: true
          schema:
            type: string
            enum: [en]
      responses:
        '200':
          description: Companion edition cards and Open CRE mappings
          content:
            application/json:
              schema:
                type: object
              examples:
                example:
                  summary: Example Companion response
                  value:
                    meta:
                      edition: OWASP Cornucopia Companion Edition
                      component: cards
                      language: en
                      version: "1.0"
                    standards: []

  /lang/{edition}/{version}:
    get:
      summary: Get language metadata for an edition version
      description: |
        Returns the list of supported languages for a given edition and version.
        Works for all registered editions (webapp, mobileapp, companion).
      parameters:
        - name: edition
          in: path
          required: true
          schema:
            type: string
            enum: [webapp, mobileapp, companion]
        - name: version
          in: path
          required: true
          schema:
            type: string
            example: "1.0"
      responses:
        '200':
          description: Language metadata for the requested edition/version
          content:
            application/json:
              schema:
                type: object
                properties:
                  meta:
                    type: object
                    properties:
                      edition:
                        type: string
                        example: companion
                      version:
                        type: string
                        example: "1.0"
                      languages:
                        type: array
                        items:
                          type: string
                        example: [en]
              examples:
                example:
                  summary: Companion edition language metadata
                  value:
                    meta:
                      edition: companion
                      version: "1.0"
                      languages: [en]
        '404':
          description: Edition or version not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

components:

  schemas:

    Error:
      type: object
      properties:
        error:
          type: string
          example: Language not available

    LanguageMetaWeb:
      type: object
      properties:
        meta:
          type: object
          properties:
            edition:
              type: string
              example: OWASP Cornucopia Website App Edition
            component:
              type: string
              example: cards
            language:
              type: string
              example: all
            languages:
              type: array
              items:
                type: string
              example: [en, es, fr, nl, no_nb, pt_br, pt_pt, it, ru]
            version:
              type: string
              example: "2.2"

    LanguageMetaMobile:
      type: object
      properties:
        meta:
          type: object
          properties:
            edition:
              type: string
              example: OWASP Cornucopia Mobile App Edition
            component:
              type: string
              example: cards
            language:
              type: string
              example: all
            languages:
              type: array
              items:
                type: string
              example: [en]
            version:
              type: string
              example: "1.1"

    LanguageMetaDbd:
      type: object
      properties:
        meta:
          type: object
          properties:
            component:
              type: string
              example: cards
            language:
              type: string
              example: all
            languages:
              type: array
              items:
                type: string
              example: [en]
            version:
              type: string
              example: "1.0"
LanguageMetaCompanion:
          type: object
          properties:
            meta:
              type: object
              properties:
                edition:
                  type: string
                  example: OWASP Cornucopia Companion Edition
                component:
                  type: string
                  example: cards
                language:
                  type: string
                  example: all
                languages:
                  type: array
                  items:
                    type: string
                  example: [en]
                version:
                  type: string
                  example: "1.0"
